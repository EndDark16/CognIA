services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cognia_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cognia_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cognia_app} -d ${POSTGRES_DB:-cognia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    environment:
      APP_CONFIG_CLASS: ${APP_CONFIG_CLASS:-config.settings.ProductionConfig}
      DB_USER: ${DB_USER:-cognia_app}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: ${DB_HOST:-supabase-host-required}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-1}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-15}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      READINESS_CACHE_TTL_SECONDS: ${READINESS_CACHE_TTL_SECONDS:-5}
      READINESS_DB_TIMEOUT_MS: ${READINESS_DB_TIMEOUT_MS:-1200}
      QV2_TRANSPORT_KEY_CACHE_TTL_SECONDS: ${QV2_TRANSPORT_KEY_CACHE_TTL_SECONDS:-60}
      QV2_ACTIVE_PAYLOAD_CACHE_TTL_SECONDS: ${QV2_ACTIVE_PAYLOAD_CACHE_TTL_SECONDS:-300}
      QV2_ACTIVE_VERSION_CACHE_TTL_SECONDS: ${QV2_ACTIVE_VERSION_CACHE_TTL_SECONDS:-120}
      QV2_ACTIVE_ACTIVATION_CACHE_TTL_SECONDS: ${QV2_ACTIVE_ACTIVATION_CACHE_TTL_SECONDS:-300}
      JWT_SECURITY_STATE_CACHE_TTL_SECONDS: ${JWT_SECURITY_STATE_CACHE_TTL_SECONDS:-60}
      AUTH_ME_CACHE_TTL_SECONDS: ${AUTH_ME_CACHE_TTL_SECONDS:-60}
      CACHE_BACKEND_URI: ${CACHE_BACKEND_URI:-}
      CACHE_KEY_PREFIX: ${CACHE_KEY_PREFIX:-cognia}
      GUNICORN_WORKER_CLASS: ${GUNICORN_WORKER_CLASS:-gthread}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
      GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-1000}
      GUNICORN_MAX_REQUESTS_JITTER: ${GUNICORN_MAX_REQUESTS_JITTER:-100}
      OPENAPI_PUBLIC_ENABLED: ${OPENAPI_PUBLIC_ENABLED:-false}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-replace-with-base64-urlsafe-32bytes-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5000}
    ports:
      - "5000:5000"
    command: ["/app/docker/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
