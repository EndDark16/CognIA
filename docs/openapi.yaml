openapi: 3.0.3
info:
  title: CognIA API
  version: 0.1.0
  description: |
    API backend de la tesis "Aplicativo web con Random Forest para la alerta temprana
    de cinco trastornos psicologicos en ninos de 6 a 11 anos".
    Proyecto academico del programa de Ingenieria de Sistemas y Computacion en la
    Universidad de Cundinamarca (grupo GISTFA).
    Esta API genera alertas de riesgo y no representa un diagnostico clinico.
    Trabaja solo con datos simulados o anonimizados.

    Enfoque de seguridad y buenas practicas:
    - Auth: JWT access token en JSON; refresh token en cookie HttpOnly con path
      /api/auth/refresh.
    - CSRF: double-submit con header X-CSRF-Token y cookie csrf_refresh_token; la
      cookie rota en refresh.
    - MFA: TOTP con secreto cifrado y recovery codes; obligatorio para roles
      privilegiados.
    - Observabilidad: /healthz (liveness), /readyz (DB readiness), /metrics (token
      opcional, por proceso).

    Notas:
    - Si usas cookies, define CORS_ORIGINS explicitos y envia credenciales.
    - /api/predict es experimental y puede cambiar.

    Creditos:
    - Andres Felipe Melo Chaguala (estudiante investigador)
    - Johan Thomas Cristancho Silva (estudiante investigador)
    - Oscar Jobany Gomez Ochoa (director)
    - Universidad de Cundinamarca, grupo GISTFA
servers:
  - url: /
    description: Same-origin (use the host that serves /docs)
  - url: http://127.0.0.1:5000
    description: Local development (IPv4)
  - url: http://localhost:5000
    description: Local development (hostname)

tags:
  - name: Health
    description: Liveness, readiness, and basic metrics.
  - name: Auth
    description: Registration, login, refresh, and logout using JWT in cookies.
  - name: MFA
    description: TOTP setup, confirmation, recovery codes, and disable.
  - name: Predict
    description: Experimental model inference (placeholder).

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      description: Confirms the service process is running.
      operationId: healthz
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check (DB)
      description: Verifies database connectivity.
      operationId: readyz
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotReadyResponse"

  /metrics:
    get:
      tags: [Health]
      summary: Metrics snapshot (in-memory)
      description: |
        Returns in-memory counters for the current process.
        If METRICS_TOKEN is configured, include Authorization: Bearer <token>.
      operationId: metrics
      security:
        - metricsToken: []
        - {}
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Metrics disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/predict:
    post:
      tags: [Predict]
      summary: Run prediction (experimental)
      description: |
        Experimental endpoint. The prediction pipeline is currently a sketch and
        may change without notice.
      operationId: predict
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictRequest"
            examples:
              sample:
                summary: Example input
                value:
                  age: 10
                  sex: 1
                  conners_inattention_score: 12.5
                  conners_hyperactivity: 8.1
                  cbcl_attention_score: 14.0
                  sleep_problems: 0
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      description: |
        Creates a new user account. Username and email must be unique.
        Password must be at least 8 characters.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login (password)
      description: |
        Authenticate with username and password.
        On success returns an access token in JSON and sets refresh_token and
        csrf_refresh_token cookies. If MFA is enabled, returns a challenge without
        cookies. Rate limit: 5 per 15 minutes per IP.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Access token or MFA challenge
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthTokenResponse"
                  - $ref: "#/components/schemas/MFAChallengeResponse"
              examples:
                token:
                  summary: Access token response
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
                mfa_challenge:
                  summary: MFA challenge response
                  value:
                    mfa_required: true
                    challenge_id: "<uuid>"
                    expires_in: 300
                    error: mfa_required
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/auth/login/mfa:
    post:
      tags: [Auth]
      summary: Complete MFA login
      description: |
        Completes the MFA challenge using a TOTP code or a recovery code.
        Rate limit: 3 per 10 minutes per IP.
      operationId: loginMfa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginMFARequest"
      responses:
        "200":
          description: Access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Uses the refresh_token cookie to issue a new access token.
        Requires a CSRF double-submit: X-CSRF-Token header must match the
        csrf_refresh_token cookie. Refresh token is rotated on every call.
      operationId: refresh
      security:
        - cookieAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: New access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token rotated + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh tokens)
      description: |
        Requires an access token plus CSRF header and cookie.
        Revokes all refresh tokens for the user.
      operationId: logout
      security:
        - bearerAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
              description: auth cookies cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"

  /api/mfa/setup:
    post:
      tags: [MFA]
      summary: MFA setup
      description: |
        Creates or replaces the user's TOTP secret and returns an otpauth URI.
        The plain secret is returned only in DEBUG or TESTING.
      operationId: mfaSetup
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA otpauth URI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFASetupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/mfa/confirm:
    post:
      tags: [MFA]
      summary: Confirm MFA
      description: Confirms the TOTP code and returns one-time recovery codes.
      operationId: mfaConfirm
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFAConfirmRequest"
      responses:
        "200":
          description: Recovery codes (one-time)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFAConfirmResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/mfa/disable:
    post:
      tags: [MFA]
      summary: Disable MFA
      description: |
        Disables MFA after validating the password and a TOTP or recovery code.
        Revokes all refresh tokens for the user.
      operationId: mfaDisable
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFADisableRequest"
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: true
      schema:
        type: string
      description: Must match the csrf_refresh_token cookie value.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token sent in the Authorization header.
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token cookie (HttpOnly).
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_refresh_token
      description: CSRF cookie used for double-submit validation.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF header used for double-submit validation.
    metricsToken:
      type: apiKey
      in: header
      name: Authorization
      description: "Bearer token for /metrics (Authorization: Bearer <token>)."

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    CsrfFailed:
      description: CSRF validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        msg:
          type: string
        error:
          type: string
      example:
        msg: Invalid credentials
        error: invalid_credentials
    ValidationError:
      type: object
      properties:
        errors:
          type: object
      example:
        errors:
          age: ["Must be greater than or equal to 3."]
    MessageResponse:
      type: object
      properties:
        msg:
          type: string
      example:
        msg: ok
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: ready
        latency_ms:
          type: number
          example: 2.4
    NotReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: not_ready
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: testuser
        email:
          type: string
          example: test@example.com
        password:
          type: string
          format: password
          example: P4ssw0rd!
        full_name:
          type: string
          example: Test User
    RegisterResponse:
      type: object
      properties:
        msg:
          type: string
          example: user created
        user_id:
          type: string
          format: uuid
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: testuser
        password:
          type: string
          format: password
          example: P4ssw0rd!
    AuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 900
    MFAChallengeResponse:
      type: object
      properties:
        mfa_required:
          type: boolean
          example: true
        challenge_id:
          type: string
          format: uuid
        expires_in:
          type: integer
          example: 300
        error:
          type: string
          example: mfa_required
    LoginMFARequest:
      type: object
      description: Provide either code or recovery_code.
      required: [challenge_id]
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
          description: TOTP code
          example: "123456"
        recovery_code:
          type: string
          description: One-time recovery code
          example: "a1b2c3d4"
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: logged out
    MFASetupResponse:
      type: object
      properties:
        otpauth_uri:
          type: string
          example: otpauth://totp/CogniaApp:demo?secret=BASE32&issuer=CogniaApp
        secret:
          type: string
          description: Returned only in DEBUG/TESTING
    MFAConfirmRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: "123456"
    MFAConfirmResponse:
      type: object
      properties:
        recovery_codes:
          type: array
          items:
            type: string
          example: ["a1b2c3d4", "e5f6g7h8"]
    MFADisableRequest:
      type: object
      description: Provide password and either code or recovery_code.
      required: [password]
      properties:
        password:
          type: string
          format: password
        code:
          type: string
        recovery_code:
          type: string
    PredictRequest:
      type: object
      required:
        - age
        - sex
        - conners_inattention_score
        - conners_hyperactivity
        - cbcl_attention_score
        - sleep_problems
      properties:
        age:
          type: integer
          minimum: 3
          maximum: 21
        sex:
          type: integer
          enum: [0, 1]
          description: 0=f, 1=m
        conners_inattention_score:
          type: number
        conners_hyperactivity:
          type: number
        cbcl_attention_score:
          type: number
        sleep_problems:
          type: integer
          enum: [0, 1]
    PredictResponse:
      type: object
      properties:
        predictions:
          type: object
      example:
        predictions:
          adhd: 0.42
    MetricsResponse:
      type: object
      properties:
        uptime_seconds:
          type: integer
          example: 120
        requests_total:
          type: integer
          example: 57
        latency_ms_avg:
          type: number
          example: 12.34
        latency_ms_max:
          type: number
          example: 120.5
        status_counts:
          type: object
          additionalProperties:
            type: integer
          example:
            "200": 54
            "401": 2
            "500": 1
