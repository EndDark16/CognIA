components:
  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: true
      schema:
        type: string
    PageParam:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      in: query
      name: page_size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OrderParam:
      in: query
      name: order
      required: false
      schema:
        type: string
        enum:
        - asc
        - desc
        default: desc
    MonthsParam:
      in: query
      name: months
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 120
        default: 12
    UnreadOnlyParam:
      in: query
      name: unread_only
      required: false
      schema:
        type: boolean
        default: false
    RuntimeExportModeParam:
      in: query
      name: mode
      required: false
      schema:
        type: string
        enum:
        - responses_only
        - results_only
        - responses_and_results
        default: responses_and_results
    ModeParamV2:
      in: query
      name: mode
      required: false
      schema:
        type: string
        enum:
        - short
        - medium
        - complete
        default: short
    RoleParamV2:
      in: query
      name: role
      required: false
      schema:
        type: string
        enum:
        - caregiver
        - psychologist
        default: caregiver
    IncludeFullParam:
      in: query
      name: include_full
      required: false
      schema:
        type: boolean
        default: false
    SessionStatusParam:
      in: query
      name: status
      required: false
      schema:
        type: string
        enum:
        - draft
        - in_progress
        - submitted
        - processed
        - failed
        - archived
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    mfaEnrollmentToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_refresh_token
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
    metricsToken:
      type: apiKey
      in: header
      name: Authorization
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CsrfFailed:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Locked:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required:
      - msg
      - error
      properties:
        msg:
          type: string
