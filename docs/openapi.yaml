openapi: 3.0.3
info:
  title: CognIA API
  version: 0.1.0
  description: |
    API backend de la tesis "Aplicativo web con Random Forest para la alerta temprana
    de cinco trastornos psicologicos en ninos de 6 a 11 anos".
    Proyecto academico del programa de Ingenieria de Sistemas y Computacion en la
    Universidad de Cundinamarca (grupo GISTFA).
    Esta API genera alertas de riesgo y no representa un diagnostico clinico.
    Trabaja solo con datos simulados o anonimizados.

    Enfoque de seguridad y buenas practicas:
    - Auth: JWT access token en JSON; refresh token en cookie HttpOnly con path
      /api/auth/refresh.
    - CSRF: double-submit con header X-CSRF-Token y cookie csrf_refresh_token; la
      cookie rota en refresh.
    - MFA: TOTP con secreto cifrado y recovery codes; obligatorio para roles
      privilegiados.
    - Observabilidad: /healthz (liveness), /readyz (DB readiness), /metrics (token
      opcional, por proceso).

    Notas:
    - Si usas cookies, define CORS_ORIGINS explicitos y envia credenciales.
    - /api/predict es experimental y puede cambiar.

    Creditos:
    - Andres Felipe Melo Chaguala (estudiante investigador)
    - Johan Thomas Cristancho Silva (estudiante investigador)
    - Oscar Jobany Gomez Ochoa (director)
    - Universidad de Cundinamarca, grupo GISTFA
servers:
  - url: /
    description: Same-origin (use the host that serves /docs)
  - url: http://127.0.0.1:5000
    description: Local development (IPv4)
  - url: http://localhost:5000
    description: Local development (hostname)

tags:
  - name: Health
    description: Liveness, readiness, and basic metrics.
  - name: Auth
    description: Registration, login, refresh, and logout using JWT in cookies.
  - name: MFA
    description: TOTP setup, confirmation, recovery codes, and disable.
  - name: Email
    description: Email unsubscribe utilities.
  - name: Admin
    description: Admin operations (users, audits, content, evaluations).
  - name: Users
    description: Admin user management.
  - name: Questionnaires
    description: Questionnaire templates and active template retrieval.
  - name: Evaluations
    description: Create evaluations using the active questionnaire.
  - name: Predict
    description: Experimental model inference (placeholder).

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      description: Confirms the service process is running.
      operationId: getLiveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check (DB)
      description: Verifies database connectivity.
      operationId: getReadiness
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotReadyResponse"

  /metrics:
    get:
      tags: [Health]
      summary: Metrics snapshot (in-memory)
      description: |
        Returns in-memory counters for the current process.
        If METRICS_TOKEN is configured, include Authorization: Bearer <token>.
      operationId: getMetrics
      security:
        - metricsToken: []
        - {}
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Metrics disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMsg"
              examples:
                disabled:
                  summary: Disabled
                  value:
                    msg: Metrics disabled
        "500":
          $ref: "#/components/responses/ServerError"

  /api/predict:
    post:
      tags: [Predict]
      summary: Run prediction (experimental)
      description: |
        Experimental endpoint. The prediction pipeline is currently a sketch and
        may change without notice.
      operationId: createPrediction
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictRequest"
            examples:
              typical:
                summary: Typical input
                value:
                  age: 10
                  sex: 1
                  conners_inattention_score: 12.5
                  conners_hyperactivity: 8.1
                  cbcl_attention_score: 14.0
                  sleep_problems: 0
              edge:
                summary: Edge of valid range
                value:
                  age: 3
                  sex: 0
                  conners_inattention_score: 0.0
                  conners_hyperactivity: 0.0
                  cbcl_attention_score: 0.0
                  sleep_problems: 1
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictResponse"
              examples:
                typical:
                  summary: Typical prediction
                  value:
                    predictions:
                      adhd: 0.42
                      anxiety: 0.18
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_payload:
                  summary: Missing required fields
                  value:
                    msg: Validation error
                    error: validation_error
                    errors:
                      age: ["Missing data for required field."]
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      description: |
        Creates a new user account. Username and email must be unique.
        Password must be at least 8 characters.
        user_type must be guardian or psychologist. If psychologist, provide
        professional_card_number (COLPSIC).
        Username is case-sensitive and must match ^[A-Za-z0-9._-]{3,32}$.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              guardian:
                summary: Guardian registration
                value:
                  username: guardian_01
                  email: guardian@example.com
                  password: "P4ssw0rd!"
                  full_name: Maria Perez
                  user_type: guardian
              psychologist:
                summary: Psychologist registration
                value:
                  username: dr_gomez
                  email: dr.gomez@example.com
                  password: "P4ssw0rd!"
                  full_name: Oscar Gomez
                  user_type: psychologist
                  professional_card_number: "COLPSIC-12345"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              examples:
                created:
                  summary: Registered
                  value:
                    msg: user created
                    user_id: "b28e6f7e-2c88-4a31-9c2f-0f35e33b2c4a"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login (password)
      description: |
        Authenticate with username and password.
        On success returns an access token in JSON and sets refresh_token and
        csrf_refresh_token cookies. If MFA is enabled, returns a challenge without
        cookies. If MFA enrollment is required, returns a short-lived enrollment
        token restricted to MFA setup/confirm. For valid credentials the endpoint
        always responds 200, with one of:
        - access_token + cookies (login complete)
        - mfa_required + challenge_id (no cookies)
        - mfa_enrollment_required + enrollment_token (no cookies)
        Rate limit: 5 per 15 minutes per IP.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              typical:
                summary: Username/password
                value:
                  username: guardian_01
                  password: "P4ssw0rd!"
      responses:
        "200":
          description: Access token or MFA challenge
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthTokenResponse"
                  - $ref: "#/components/schemas/MFAChallengeResponse"
                  - $ref: "#/components/schemas/MFAEnrollmentResponse"
              examples:
                token:
                  summary: Access token response
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
                mfa_challenge:
                  summary: MFA challenge response
                  value:
                    mfa_required: true
                    challenge_id: "<uuid>"
                    expires_in: 300
                    error: mfa_required
                mfa_enrollment:
                  summary: MFA enrollment response
                  value:
                    mfa_enrollment_required: true
                    enrollment_token: "<jwt>"
                    token_type: bearer
                    expires_in: 600
                    msg: MFA enrollment required
                    error: mfa_enrollment_required
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "423":
          $ref: "#/components/responses/Locked"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login/mfa:
    post:
      tags: [Auth]
      summary: Complete MFA login
      description: |
        Completes the MFA challenge using a TOTP code or a recovery code.
        If MFA enrollment is still required, returns 403 with
        error mfa_enrollment_required.
        Rate limit: 3 per 10 minutes per IP.
      operationId: completeMfaLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginMFARequest"
            examples:
              totp:
                summary: TOTP code
                value:
                  challenge_id: "5f6c5f8f-2f7f-4c57-97f2-9f9e38c8d1d1"
                  code: "123456"
              recovery:
                summary: Recovery code
                value:
                  challenge_id: "5f6c5f8f-2f7f-4c57-97f2-9f9e38c8d1d1"
                  recovery_code: "a1b2c3d4"
      responses:
        "200":
          description: Access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              examples:
                token:
                  summary: Access token
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Uses the refresh_token cookie to issue a new access token.
        Requires a CSRF double-submit: X-CSRF-Token header must match the
        csrf_refresh_token cookie. Refresh token is rotated on every call.
        If MFA enrollment is required, returns 401 and clears auth cookies.
      operationId: refreshSession
      security:
        - cookieAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: New access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token rotated + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              examples:
                token:
                  summary: Refreshed token
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh tokens)
      description: |
        Requires an access token plus CSRF header and cookie.
        Revokes all refresh tokens for the user.
      operationId: logoutUser
      security:
        - bearerAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
              description: auth cookies cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                logged_out:
                  summary: Logged out
                  value:
                    message: logged out
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      description: Returns profile information for the authenticated user.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/change:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
            examples:
              typical:
                summary: Change password
                value:
                  currentPassword: "P4ssw0rd!"
                  newPassword: "N3wP4ssw0rd!"
                  confirmNewPassword: "N3wP4ssw0rd!"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                updated:
                  summary: Updated
                  value:
                    message: Password updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Request password reset (public)
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordForgotRequest"
            examples:
              typical:
                summary: Password reset request
                value:
                  email: guardian@example.com
      responses:
        "200":
          description: Generic response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                accepted:
                  summary: Accepted
                  value:
                    message: If the email exists, a reset link has been sent
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password with token (public)
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
            examples:
              typical:
                summary: Reset with token
                value:
                  token: "reset-token-123"
                  newPassword: "N3wP4ssw0rd!"
                  confirmNewPassword: "N3wP4ssw0rd!"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                updated:
                  summary: Updated
                  value:
                    message: Password updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/reset/verify:
    get:
      tags: [Auth]
      summary: Verify password reset token
      operationId: verifyResetToken
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetVerifyResponse"
              examples:
                valid:
                  summary: Valid token
                  value:
                    valid: true
        "400":
          description: Token invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetVerifyResponse"
              examples:
                invalid:
                  summary: Invalid token
                  value:
                    valid: false
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/email/unsubscribe:
    get:
      tags: [Email]
      summary: Unsubscribe from emails (token)
      description: |
        One-click unsubscribe endpoint. The token is signed and does not expose
        the email address. Returns a generic success message when valid.
      operationId: unsubscribeEmail
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
            minLength: 10
            maxLength: 512
        - in: query
          name: reason
          required: false
          schema:
            type: string
            maxLength: 200
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                success:
                  summary: Unsubscribed
                  value:
                    message: Unsubscribed
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags: [Email]
      summary: Unsubscribe from emails (token, one-click)
      description: |
        Supports List-Unsubscribe one-click POST. Token can be passed in the
        query string or body. Returns a generic success message when valid.
      operationId: unsubscribeEmailPost
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailUnsubscribeRequest"
            examples:
              typical:
                summary: Unsubscribe with reason
                value:
                  token: "unsubscribe-token-123"
                  reason: "Too many emails"
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                success:
                  summary: Unsubscribed
                  value:
                    message: Unsubscribed
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/mfa/setup:
    post:
      tags: [MFA]
      summary: MFA setup
      description: |
        Creates or replaces the user's TOTP secret and returns an otpauth URI.
        The plain secret is returned only in DEBUG or TESTING.
        Accepts either a full access token or a short-lived enrollment token.
        Enrollment tokens cannot be used for other endpoints (refresh/logout/disable).
      operationId: setupMfa
      security:
        - bearerAuth: []
        - mfaEnrollmentToken: []
      responses:
        "200":
          description: MFA otpauth URI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFASetupResponse"
              examples:
                setup:
                  summary: Setup response
                  value:
                    otpauth_uri: otpauth://totp/CogniaApp:demo?secret=BASE32&issuer=CogniaApp
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/mfa/confirm:
    post:
      tags: [MFA]
      summary: Confirm MFA
      description: |
        Confirms the TOTP code and returns one-time recovery codes.
        Accepts either a full access token or a short-lived enrollment token.
        Enrollment tokens are limited to setup/confirm only.
      operationId: confirmMfa
      security:
        - bearerAuth: []
        - mfaEnrollmentToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFAConfirmRequest"
            examples:
              totp:
                summary: Confirm with TOTP
                value:
                  code: "123456"
      responses:
        "200":
          description: Recovery codes (one-time)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFAConfirmResponse"
              examples:
                recovery:
                  summary: Recovery codes
                  value:
                    recovery_codes:
                      - "a1b2c3d4"
                      - "e5f6g7h8"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/mfa/disable:
    post:
      tags: [MFA]
      summary: Disable MFA
      description: |
        Disables MFA after validating the password and a TOTP or recovery code.
        Revokes all refresh tokens for the user.
        Enrollment tokens are not allowed on this endpoint.
      operationId: disableMfa
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFADisableRequest"
            examples:
              totp:
                summary: Disable with TOTP
                value:
                  password: "P4ssw0rd!"
                  code: "123456"
              recovery:
                summary: Disable with recovery code
                value:
                  password: "P4ssw0rd!"
                  recovery_code: "a1b2c3d4"
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMsg"
              examples:
                disabled:
                  summary: Disabled
                  value:
                    msg: MFA disabled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/questionnaires/active:
    get:
      tags: [Questionnaires]
      summary: Get active questionnaire template
      description: |
        Returns the single active template and its questions.
        Questions are ordered by position ASC, then created_at ASC.
        If position is null, those items appear last.
      operationId: getActiveQuestionnaire
      responses:
        "200":
          description: Active template with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveQuestionnaireResponse"
              examples:
                active:
                  summary: Active questionnaire
                  value:
                    questionnaire_template:
                      id: "2e2d89a7-2f5b-4a9d-a62e-0af36e3db9d6"
                      name: "Conners Short"
                      version: "v1"
                      description: "Instrumento base"
                      is_active: true
                    questions:
                      - id: "bd875d7f-6f1a-4c2c-9905-1ce14f74c0d1"
                        code: "Q1"
                        text: "Dificultad para concentrarse"
                        response_type: likert_0_4
                        disorder_id: null
                        disorder_ids: []
                        position: 1
                        response_min: 0
                        response_max: 4
                        response_step: 1
                        response_options: null
        "404":
          description: No active template
          content:
