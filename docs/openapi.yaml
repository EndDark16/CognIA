openapi: 3.0.3
info:
  title: CognIA API
  version: 0.1.0
  description: 'API backend de CognIA para screening y apoyo profesional en salud mental infantil (6 a 11 anos)
    en entorno simulado.\n\nAlcance funcional actual:\n- Autenticacion/autorizacion (JWT, refresh cookie, RBAC,
    MFA).\n- Cuestionarios v1 legacy, runtime v1 y operacional v2 (sesiones, historial, share, PDF).\n- Gobierno
    administrativo de usuarios, roles, cuestionarios, evaluaciones y auditoria.\n- Reportes de problema con adjuntos
    validados y trazabilidad.\n- Dashboards y reportes operativos v2.\n\nConsideraciones metodologicas:\n- El sistema
    entrega alertas de riesgo para tamizaje/apoyo profesional.\n- No constituye diagnostico clinico automatico ni
    reemplaza criterio profesional.\n\nSeguridad principal:\n- JWT para endpoints protegidos y refresh token rotativo
    en cookie HttpOnly.\n- CSRF double-submit en flujos con cookies.\n- MFA TOTP y politicas de hardening/rate limiting.\n\nGobernanza
    de contrato:\n- Fuente activa: docs/openapi.yaml.\n- Validacion automatizada runtime vs OpenAPI en tests de
    contrato.'
servers:
- url: /
  description: Same-origin (use the host that serves /docs)
- url: http://127.0.0.1:5000
  description: Local development (IPv4)
- url: http://localhost:5000
  description: Local development (hostname)
tags:
- name: Health
  description: Salud del servicio, readiness de base de datos y metricas del proceso.
- name: Auth
  description: Registro, login, refresh, logout y recuperacion de contrasena.
- name: MFA
  description: Enrolamiento, confirmacion y desactivacion de autenticacion multifactor.
- name: Email
  description: Desuscripcion de correos y cumplimiento de comunicaciones.
- name: Admin
  description: Gobernanza administrativa y operaciones de supervision.
- name: Users
  description: Gestion administrativa v1 de usuarios (compatibilidad legacy).
- name: Questionnaires
  description: Plantillas de cuestionario v1 y endpoints legacy de compatibilidad.
- name: Evaluations
  description: Creacion de evaluaciones v1 basadas en plantilla activa.
- name: Predict
  description: Inferencia experimental heredada, no recomendada para nuevas integraciones.
- name: QuestionnaireRuntime
  description: Flujo runtime v1 de evaluaciones y acceso profesional.
- name: QuestionnaireRuntimeAdmin
  description: Gobierno runtime v1 de templates/versiones/secciones.
- name: QuestionnaireV2
  description: Flujo operacional v2 de sesiones, historial, tags, share y PDF.
- name: Dashboard
  description: Consultas de analitica y monitoreo operativo v2.
- name: Reports
  description: Creacion de jobs de reporte operativo v2.
- name: Docs
  description: Swagger UI y especificacion OpenAPI estatica.
- name: ProblemReports
  description: Registro y gestion de reportes de problema.
paths:
  /healthz:
    get:
      tags:
      - Health
      summary: Verificar liveness del backend
      description: '**Objetivo funcional real:** Verificar liveness del backend.\n\n**Recurso/proceso que gestiona:**
        `GET /healthz`.\n**Cuando debe usarse:** Usar cuando necesites lectura o consulta del estado actual sin
        mutar el recurso.\n**Actor o rol que suele consumirlo:** Infraestructura, observabilidad y operaciones de
        plataforma.\n**Seguridad aplicable:** No declara esquema de autenticacion obligatorio en OpenAPI; puede
        ser publico segun configuracion.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados en este
        contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: sin parametros declarados en
        este contrato.\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** No aplica
        body en este endpoint segun la especificacion.\n\n**Comportamiento esperado del endpoint:** Operacion de
        lectura; no debe mutar estado de negocio salvo telemetria tecnica.\n\n**Respuesta exitosa y significado
        funcional:** 200: OK (estructura: HealthResponse).\n**Errores posibles documentados:** No declara errores
        4xx/5xx adicionales fuera de manejadores globales.\n**Persistencia / workflow / trazabilidad:** Sin persistencia
        de negocio; endpoint de salud/observabilidad/documentacion.\n**Clasificacion del endpoint:** publico.'
      operationId: verificarLivenessBackend
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags:
      - Health
      summary: Verificar readiness con base de datos
      description: '**Objetivo funcional real:** Verificar readiness con base de datos.\n\n**Recurso/proceso que
        gestiona:** `GET /readyz`.\n**Cuando debe usarse:** Usar cuando necesites lectura o consulta del estado
        actual sin mutar el recurso.\n**Actor o rol que suele consumirlo:** Infraestructura, observabilidad y operaciones
        de plataforma.\n**Seguridad aplicable:** No declara esquema de autenticacion obligatorio en OpenAPI; puede
        ser publico segun configuracion.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados en este
        contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: sin parametros declarados en
        este contrato.\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** No aplica
        body en este endpoint segun la especificacion.\n\n**Comportamiento esperado del endpoint:** Operacion de
        lectura; no debe mutar estado de negocio salvo telemetria tecnica.\n\n**Respuesta exitosa y significado
        funcional:** 200: Ready (estructura: ReadyResponse).\n**Errores posibles documentados:** 503 (dependencia
        critica no disponible (readiness/db)).\n**Persistencia / workflow / trazabilidad:** Sin persistencia de
        negocio; endpoint de salud/observabilidad/documentacion.\n**Clasificacion del endpoint:** publico.'
      operationId: verificarReadinessBaseDatos
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotReadyResponse'
  /metrics:
    get:
      tags:
      - Health
      summary: Consultar metricas internas del proceso
      description: '**Objetivo funcional real:** Consultar metricas internas del proceso.\n\n**Recurso/proceso que
        gestiona:** `GET /metrics`.\n**Cuando debe usarse:** Usar cuando necesites lectura o consulta del estado
        actual sin mutar el recurso.\n**Actor o rol que suele consumirlo:** Infraestructura, observabilidad y operaciones
        de plataforma.\n**Seguridad aplicable:** Requiere: token de metricas en Authorization; acceso anonimo permitido
        segun configuracion.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados en este contrato.\n-
        Query: sin parametros declarados en este contrato.\n- Headers: sin parametros declarados en este contrato.\n-
        Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** No aplica body en este endpoint
        segun la especificacion.\n\n**Comportamiento esperado del endpoint:** Operacion de lectura; no debe mutar
        estado de negocio salvo telemetria tecnica.\n\n**Respuesta exitosa y significado funcional:** 200: Metrics
        snapshot (estructura: MetricsResponse).\n**Errores posibles documentados:** 401 (falta de autenticacion
        valida o token no aceptado); 404 (recurso solicitado no encontrado o no visible para el actor); 500 (falla
        interna del servicio).\n**Persistencia / workflow / trazabilidad:** Sin persistencia de negocio; endpoint
        de salud/observabilidad/documentacion.\n**Clasificacion del endpoint:** autenticado.\n**Caveats y restricciones
        relevantes:** Puede requerir token si METRICS_TOKEN_REQUIRED esta activo.'
      operationId: consultarMetricasInternasProceso
      security:
      - metricsToken: []
      - {}
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Metrics disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseMsg'
              examples:
                disabled:
                  summary: Disabled
                  value:
                    msg: Metrics disabled
        '500':
          $ref: '#/components/responses/ServerError'
  /api/predict:
    post:
      tags:
      - Predict
      summary: Ejecutar inferencia experimental (legacy)
      description: '**Objetivo funcional real:** Ejecutar inferencia experimental (legacy).\n\n**Recurso/proceso
        que gestiona:** `POST /api/predict`.\n**Cuando debe usarse:** Usar cuando necesites crear recurso o ejecutar
        una accion de negocio.\n**Actor o rol que suele consumirlo:** Consumo tecnico experimental para pruebas
        de inferencia heredada.\n**Seguridad aplicable:** No declara esquema de autenticacion obligatorio en OpenAPI;
        puede ser publico segun configuracion.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados
        en este contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: sin parametros declarados
        en este contrato.\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** Body
        obligatorio. Tipos de contenido esperados: application/json usando PredictRequest.\n\n**Comportamiento esperado
        del endpoint:** Operacion potencialmente mutante sobre estado de negocio. Endpoint experimental y no recomendado
        para nuevas integraciones.\n\n**Respuesta exitosa y significado funcional:** 200: Prediction result (estructura:
        PredictResponse).\n**Errores posibles documentados:** 400 (solicitud invalida o error de validacion de entrada);
        500 (falla interna del servicio).\n**Persistencia / workflow / trazabilidad:** Puede crear/actualizar estado
        persistido y dejar trazabilidad de workflow/auditoria.\n**Clasificacion del endpoint:** legacy/deprecated,
        experimental.\n**Caveats y restricciones relevantes:** Marcado como deprecated por compatibilidad; planificar
        migracion.'
      operationId: ejecutarInferenciaExperimentalLegacy
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredictRequest'
            examples:
              typical:
                summary: Typical input
                value:
                  age: 10
                  sex: 1
                  conners_inattention_score: 12.5
                  conners_hyperactivity: 8.1
                  cbcl_attention_score: 14.0
                  sleep_problems: 0
              edge:
                summary: Edge of valid range
                value:
                  age: 3
                  sex: 0
                  conners_inattention_score: 0.0
                  conners_hyperactivity: 0.0
                  cbcl_attention_score: 0.0
                  sleep_problems: 1
      responses:
        '200':
          description: Prediction result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictResponse'
              examples:
                typical:
                  summary: Typical prediction
                  value:
                    predictions:
                      adhd: 0.42
                      anxiety: 0.18
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_payload:
                  summary: Missing required fields
                  value:
                    msg: Validation error
                    error: validation_error
                    errors:
                      age:
                      - Missing data for required field.
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/register:
    post:
      tags:
      - Auth
      summary: Registrar cuenta de usuario
      description: '**Objetivo funcional real:** Registrar cuenta de usuario.\n\n**Recurso/proceso que gestiona:**
        `POST /api/auth/register`.\n**Cuando debe usarse:** Usar cuando necesites crear recurso o ejecutar una accion
        de negocio.\n**Actor o rol que suele consumirlo:** Frontend de autenticacion y usuario final durante ciclo
        de acceso y recuperacion.\n**Seguridad aplicable:** No declara esquema de autenticacion obligatorio en OpenAPI;
        puede ser publico segun configuracion.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados
        en este contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: sin parametros declarados
        en este contrato.\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** Body
        obligatorio. Tipos de contenido esperados: application/json usando RegisterRequest.\n\n**Comportamiento
        esperado del endpoint:** Operacion potencialmente mutante sobre estado de negocio.\n\n**Respuesta exitosa
        y significado funcional:** 201: User created (estructura: RegisterResponse).\n**Errores posibles documentados:**
        400 (solicitud invalida o error de validacion de entrada); 409 (conflicto de estado de negocio (duplicidad
        o transicion invalida)); 429 (limite de tasa excedido por politicas de proteccion); 500 (falla interna del
        servicio).\n**Persistencia / workflow / trazabilidad:** Puede crear/actualizar estado persistido y dejar
        trazabilidad de workflow/auditoria.\n**Clasificacion del endpoint:** publico.'
      operationId: registrarCuentaUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              guardian:
                summary: Guardian registration
                value:
                  username: guardian_01
                  email: guardian@example.com
                  password: P4ssw0rd!
                  full_name: Maria Perez
                  user_type: guardian
              psychologist:
                summary: Psychologist registration
                value:
                  username: dr_gomez
                  email: dr.gomez@example.com
                  password: P4ssw0rd!
                  full_name: Oscar Gomez
                  user_type: psychologist
                  professional_card_number: COLPSIC-12345
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              examples:
                created:
                  summary: Registered
                  value:
                    msg: user created
                    user_id: b28e6f7e-2c88-4a31-9c2f-0f35e33b2c4a
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/login:
    post:
      tags:
      - Auth
      summary: Autenticar usuario con credenciales
      description: '**Objetivo funcional real:** Autenticar usuario con credenciales.\n\n**Recurso/proceso que gestiona:**
        `POST /api/auth/login`.\n**Cuando debe usarse:** Usar cuando necesites crear recurso o ejecutar una accion
        de negocio.\n**Actor o rol que suele consumirlo:** Frontend de autenticacion y usuario final durante ciclo
        de acceso y recuperacion.\n**Seguridad aplicable:** No declara esquema de autenticacion obligatorio en OpenAPI;
        puede ser publico segun configuracion.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados
        en este contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: sin parametros declarados
        en este contrato.\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** Body
        obligatorio. Tipos de contenido esperados: application/json usando LoginRequest.\n\n**Comportamiento esperado
        del endpoint:** Operacion potencialmente mutante sobre estado de negocio.\n\n**Respuesta exitosa y significado
        funcional:** 200: Access token or MFA challenge (estructura: AuthTokenResponse o MFAChallengeResponse o
        MFAEnrollmentResponse).\n**Errores posibles documentados:** 400 (solicitud invalida o error de validacion
        de entrada); 401 (falta de autenticacion valida o token no aceptado); 403 (autenticado sin permiso suficiente
        o control CSRF/MFA no satisfecho); 423 (usuario temporalmente bloqueado por politicas de seguridad); 429
        (limite de tasa excedido por politicas de proteccion); 500 (falla interna del servicio).\n**Persistencia
        / workflow / trazabilidad:** Puede crear/actualizar estado persistido y dejar trazabilidad de workflow/auditoria.\n**Clasificacion
        del endpoint:** publico.'
      operationId: autenticarUsuarioCredenciales
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              typical:
                summary: Username/password
                value:
                  username: guardian_01
                  password: P4ssw0rd!
      responses:
        '200':
          description: Access token or MFA challenge
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/AuthTokenResponse'
                - $ref: '#/components/schemas/MFAChallengeResponse'
                - $ref: '#/components/schemas/MFAEnrollmentResponse'
              examples:
                token:
                  summary: Access token response
                  value:
                    access_token: <jwt>
                    token_type: bearer
                    expires_in: 900
                mfa_challenge:
                  summary: MFA challenge response
                  value:
                    mfa_required: true
                    challenge_id: <uuid>
                    expires_in: 300
                    error: mfa_required
                mfa_enrollment:
                  summary: MFA enrollment response
                  value:
                    mfa_enrollment_required: true
                    enrollment_token: <jwt>
                    token_type: bearer
                    expires_in: 600
                    msg: MFA enrollment required
                    error: mfa_enrollment_required
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/login/mfa:
    post:
      tags:
      - Auth
      summary: Completar autenticacion MFA de login
      description: '**Objetivo funcional real:** Completar autenticacion MFA de login.\n\n**Recurso/proceso que
        gestiona:** `POST /api/auth/login/mfa`.\n**Cuando debe usarse:** Usar cuando necesites crear recurso o ejecutar
        una accion de negocio.\n**Actor o rol que suele consumirlo:** Frontend de autenticacion y usuario final
        durante ciclo de acceso y recuperacion.\n**Seguridad aplicable:** No declara esquema de autenticacion obligatorio
        en OpenAPI; puede ser publico segun configuracion.\n\n**Parametros de entrada:**\n- Ruta: sin parametros
        declarados en este contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: sin parametros
        declarados en este contrato.\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:**
        Body obligatorio. Tipos de contenido esperados: application/json usando LoginMFARequest.\n\n**Comportamiento
        esperado del endpoint:** Operacion potencialmente mutante sobre estado de negocio.\n\n**Respuesta exitosa
        y significado funcional:** 200: Access token (estructura: AuthTokenResponse).\n**Errores posibles documentados:**
        400 (solicitud invalida o error de validacion de entrada); 401 (falta de autenticacion valida o token no
        aceptado); 403 (autenticado sin permiso suficiente o control CSRF/MFA no satisfecho); 429 (limite de tasa
        excedido por politicas de proteccion); 500 (falla interna del servicio).\n**Persistencia / workflow / trazabilidad:**
        Puede crear/actualizar estado persistido y dejar trazabilidad de workflow/auditoria.\n**Clasificacion del
        endpoint:** publico.'
      operationId: completarAutenticacionMfaLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginMFARequest'
            examples:
              totp:
                summary: TOTP code
                value:
                  challenge_id: 5f6c5f8f-2f7f-4c57-97f2-9f9e38c8d1d1
                  code: '123456'
              recovery:
                summary: Recovery code
                value:
                  challenge_id: 5f6c5f8f-2f7f-4c57-97f2-9f9e38c8d1d1
                  recovery_code: a1b2c3d4
      responses:
        '200':
          description: Access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                token:
                  summary: Access token
                  value:
                    access_token: <jwt>
                    token_type: bearer
                    expires_in: 900
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/refresh:
    post:
      tags:
      - Auth
      summary: Renovar token de acceso con refresh cookie
      description: '**Objetivo funcional real:** Renovar token de acceso con refresh cookie.\n\n**Recurso/proceso
        que gestiona:** `POST /api/auth/refresh`.\n**Cuando debe usarse:** Usar cuando necesites crear recurso o
        ejecutar una accion de negocio.\n**Actor o rol que suele consumirlo:** Frontend de autenticacion y usuario
        final durante ciclo de acceso y recuperacion.\n**Seguridad aplicable:** Requiere: cookie refresh_token;
        cookie csrf_refresh_token; header X-CSRF-Token.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados
        en este contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: X-CSRF-Token (obligatorio,
        tipo string).\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** No aplica
        body en este endpoint segun la especificacion.\n\n**Comportamiento esperado del endpoint:** Operacion potencialmente
        mutante sobre estado de negocio.\n\n**Respuesta exitosa y significado funcional:** 200: New access token
        (estructura: AuthTokenResponse).\n**Errores posibles documentados:** 401 (falta de autenticacion valida
        o token no aceptado); 403 (autenticado sin permiso suficiente o control CSRF/MFA no satisfecho); 500 (falla
        interna del servicio).\n**Persistencia / workflow / trazabilidad:** Puede crear/actualizar estado persistido
        y dejar trazabilidad de workflow/auditoria.\n**Clasificacion del endpoint:** autenticado.'
      operationId: renovarTokenAccesoRefreshCookie
      security:
      - cookieAuth: []
        csrfCookie: []
        csrfHeader: []
      parameters:
      - $ref: '#/components/parameters/CsrfHeader'
      responses:
        '200':
          description: New access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token rotated + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                token:
                  summary: Refreshed token
                  value:
                    access_token: <jwt>
                    token_type: bearer
                    expires_in: 900
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CsrfFailed'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/auth/logout:
    post:
      tags:
      - Auth
      summary: Cerrar sesion y revocar refresh tokens
      description: '**Objetivo funcional real:** Cerrar sesion y revocar refresh tokens.\n\n**Recurso/proceso que
        gestiona:** `POST /api/auth/logout`.\n**Cuando debe usarse:** Usar cuando necesites crear recurso o ejecutar
        una accion de negocio.\n**Actor o rol que suele consumirlo:** Frontend de autenticacion y usuario final
        durante ciclo de acceso y recuperacion.\n**Seguridad aplicable:** Requiere: JWT Bearer de acceso valido;
        cookie csrf_refresh_token; header X-CSRF-Token.\n\n**Parametros de entrada:**\n- Ruta: sin parametros declarados
        en este contrato.\n- Query: sin parametros declarados en este contrato.\n- Headers: X-CSRF-Token (obligatorio,
        tipo string).\n- Cookies: sin parametros declarados en este contrato.\n\n**Body de solicitud:** No aplica
        body en este endpoint segun la especificacion.\n\n**Comportamiento esperado del endpoint:** Operacion potencialmente
        mutante sobre estado de negocio.\n\n**Respuesta exitosa y significado funcional:** 200: Logged out (estructura:
        LogoutResponse).\n**Errores posibles documentados:** 401 (falta de autenticacion valida o token no aceptado);
        403 (autenticado sin permiso suficiente o control CSRF/MFA no satisfecho); 500 (falla interna del servicio).\n**Persistencia
        / workflow / trazabilidad:** Puede crear/actualizar estado persistido y dejar trazabilidad de workflow/auditoria.\n**Clasificacion
        del endpoint:** autenticado.'
      operationId: cerrarSesionRevocarRefreshTokens
      security:
      - bearerAuth: []
        csrfCookie: []
        csrfHeader: []
      parameters:
      - $ref: '#/components/parameters/CsrfHeader'
      responses:
        '200':
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
              description: auth cookies cleared
          content:
