openapi: 3.0.3
info:
  title: CognIA API
  version: 0.1.0
  description: |
    API backend de la tesis "Aplicativo web con Random Forest para la alerta temprana
    de cinco trastornos psicologicos en ninos de 6 a 11 anos".
    Proyecto academico del programa de Ingenieria de Sistemas y Computacion en la
    Universidad de Cundinamarca (grupo GISTFA).
    Esta API genera alertas de riesgo y no representa un diagnostico clinico.
    Trabaja solo con datos simulados o anonimizados.

    Enfoque de seguridad y buenas practicas:
    - Auth: JWT access token en JSON; refresh token en cookie HttpOnly con path
      /api/auth/refresh.
    - CSRF: double-submit con header X-CSRF-Token y cookie csrf_refresh_token; la
      cookie rota en refresh.
    - MFA: TOTP con secreto cifrado y recovery codes; obligatorio para roles
      privilegiados.
    - Observabilidad: /healthz (liveness), /readyz (DB readiness), /metrics (token
      opcional, por proceso).

    Notas:
    - Si usas cookies, define CORS_ORIGINS explicitos y envia credenciales.
    - /api/predict es experimental y puede cambiar.

    Creditos:
    - Andres Felipe Melo Chaguala (estudiante investigador)
    - Johan Thomas Cristancho Silva (estudiante investigador)
    - Oscar Jobany Gomez Ochoa (director)
    - Universidad de Cundinamarca, grupo GISTFA
servers:
  - url: /
    description: Same-origin (use the host that serves /docs)
  - url: http://127.0.0.1:5000
    description: Local development (IPv4)
  - url: http://localhost:5000
    description: Local development (hostname)

tags:
  - name: Health
    description: Liveness, readiness, and basic metrics.
  - name: Auth
    description: Registration, login, refresh, and logout using JWT in cookies.
  - name: MFA
    description: TOTP setup, confirmation, recovery codes, and disable.
  - name: Users
    description: Admin user management.
  - name: Questionnaires
    description: Questionnaire templates and active template retrieval.
  - name: Evaluations
    description: Create evaluations using the active questionnaire.
  - name: Predict
    description: Experimental model inference (placeholder).

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      description: Confirms the service process is running.
      operationId: healthz
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check (DB)
      description: Verifies database connectivity.
      operationId: readyz
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotReadyResponse"

  /metrics:
    get:
      tags: [Health]
      summary: Metrics snapshot (in-memory)
      description: |
        Returns in-memory counters for the current process.
        If METRICS_TOKEN is configured, include Authorization: Bearer <token>.
      operationId: metrics
      security:
        - metricsToken: []
        - {}
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Metrics disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/predict:
    post:
      tags: [Predict]
      summary: Run prediction (experimental)
      description: |
        Experimental endpoint. The prediction pipeline is currently a sketch and
        may change without notice.
      operationId: predict
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictRequest"
            examples:
              sample:
                summary: Example input
                value:
                  age: 10
                  sex: 1
                  conners_inattention_score: 12.5
                  conners_hyperactivity: 8.1
                  cbcl_attention_score: 14.0
                  sleep_problems: 0
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      description: |
        Creates a new user account. Username and email must be unique.
        Password must be at least 8 characters.
        user_type must be guardian or psychologist. If psychologist, provide
        professional_card_number (COLPSIC).
        Username is case-sensitive and must match ^[A-Za-z0-9._-]{3,32}$.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login (password)
      description: |
        Authenticate with username and password.
        On success returns an access token in JSON and sets refresh_token and
        csrf_refresh_token cookies. If MFA is enabled, returns a challenge without
        cookies. If MFA enrollment is required, returns a short-lived enrollment
        token restricted to MFA setup/confirm. For valid credentials the endpoint
        always responds 200, with one of:
        - access_token + cookies (login complete)
        - mfa_required + challenge_id (no cookies)
        - mfa_enrollment_required + enrollment_token (no cookies)
        Rate limit: 5 per 15 minutes per IP.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Access token or MFA challenge
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthTokenResponse"
                  - $ref: "#/components/schemas/MFAChallengeResponse"
                  - $ref: "#/components/schemas/MFAEnrollmentResponse"
              examples:
                token:
                  summary: Access token response
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
                mfa_challenge:
                  summary: MFA challenge response
                  value:
                    mfa_required: true
                    challenge_id: "<uuid>"
                    expires_in: 300
                    error: mfa_required
                mfa_enrollment:
                  summary: MFA enrollment response
                  value:
                    mfa_enrollment_required: true
                    enrollment_token: "<jwt>"
                    token_type: bearer
                    expires_in: 600
                    msg: MFA enrollment required
                    error: mfa_enrollment_required
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/auth/login/mfa:
    post:
      tags: [Auth]
      summary: Complete MFA login
      description: |
        Completes the MFA challenge using a TOTP code or a recovery code.
        If MFA enrollment is still required, returns 403 with
        error mfa_enrollment_required.
        Rate limit: 3 per 10 minutes per IP.
      operationId: loginMfa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginMFARequest"
      responses:
        "200":
          description: Access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Uses the refresh_token cookie to issue a new access token.
        Requires a CSRF double-submit: X-CSRF-Token header must match the
        csrf_refresh_token cookie. Refresh token is rotated on every call.
        If MFA enrollment is required, returns 401 and clears auth cookies.
      operationId: refresh
      security:
        - cookieAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: New access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token rotated + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh tokens)
      description: |
        Requires an access token plus CSRF header and cookie.
        Revokes all refresh tokens for the user.
      operationId: logout
      security:
        - bearerAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
              description: auth cookies cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      description: Returns profile information for the authenticated user.
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/mfa/setup:
    post:
      tags: [MFA]
      summary: MFA setup
      description: |
        Creates or replaces the user's TOTP secret and returns an otpauth URI.
        The plain secret is returned only in DEBUG or TESTING.
        Accepts either a full access token or a short-lived enrollment token.
        Enrollment tokens cannot be used for other endpoints (refresh/logout/disable).
      operationId: mfaSetup
      security:
        - bearerAuth: []
        - mfaEnrollmentToken: []
      responses:
        "200":
          description: MFA otpauth URI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFASetupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/mfa/confirm:
    post:
      tags: [MFA]
      summary: Confirm MFA
      description: |
        Confirms the TOTP code and returns one-time recovery codes.
        Accepts either a full access token or a short-lived enrollment token.
        Enrollment tokens are limited to setup/confirm only.
      operationId: mfaConfirm
      security:
        - bearerAuth: []
        - mfaEnrollmentToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFAConfirmRequest"
      responses:
        "200":
          description: Recovery codes (one-time)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFAConfirmResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/mfa/disable:
    post:
      tags: [MFA]
      summary: Disable MFA
      description: |
        Disables MFA after validating the password and a TOTP or recovery code.
        Revokes all refresh tokens for the user.
        Enrollment tokens are not allowed on this endpoint.
      operationId: mfaDisable
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MFADisableRequest"
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/questionnaires/active:
    get:
      tags: [Questionnaires]
      summary: Get active questionnaire template
      description: |
        Returns the single active template and its questions.
        Questions are ordered by position ASC, then created_at ASC.
        If position is null, those items appear last.
      operationId: getActiveQuestionnaire
      responses:
        "200":
          description: Active template with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveQuestionnaireResponse"
        "404":
          description: No active template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/questionnaires:
    post:
      tags: [Questionnaires]
      summary: Create questionnaire template
      description: |
        Creates a new questionnaire template. New templates are created with
        is_active=false by default to enforce a single active template.
      operationId: createQuestionnaire
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionnaireCreateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/questionnaires/{template_id}/questions:
    post:
      tags: [Questionnaires]
      summary: Add questions to a template
      description: |
        Adds one or more questions to the template. If the template is active,
        changes are rejected to preserve instrument stability.
      operationId: addQuestions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/QuestionCreateRequest"
                - $ref: "#/components/schemas/QuestionCreateListRequest"
      responses:
        "201":
          description: Questions created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionsCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/questionnaires/{template_id}/activate:
    post:
      tags: [Questionnaires]
      summary: Activate a template
      description: |
        Activates a template and deactivates all others. Ensures exactly one
        active template exists globally.
      operationId: activateQuestionnaire
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Template activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/questionnaires/active/clone:
    post:
      tags: [Questionnaires]
      summary: Clone active template
      description: |
        Creates a new draft template by cloning the current active template.
        Requires a new version string. The cloned template is not activated.
      operationId: cloneActiveQuestionnaire
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionnaireCloneRequest"
      responses:
        "201":
          description: Template cloned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireCloneResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/evaluations:
    post:
      tags: [Evaluations]
      summary: Create evaluation from active questionnaire
      description: |
        Creates an evaluation linked to the currently active questionnaire
        template. Validates that all responses reference questions from the
        active template.
      operationId: createEvaluation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationCreateRequest"
      responses:
        "201":
          description: Evaluation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users (admin)
      description: Paginated list of users. Requires ADMIN role.
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          required: false
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
          required: false
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Users]
      summary: Create user (admin)
      description: Create a new user with optional roles. Requires ADMIN role.
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/v1/users/{user_id}:
    get:
      tags: [Users]
      summary: Get user (admin)
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Update user (admin)
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Users]
      summary: Deactivate user (admin)
      operationId: deactivateUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

components:
  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: true
      schema:
        type: string
      description: Must match the csrf_refresh_token cookie value.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token sent in the Authorization header.
    mfaEnrollmentToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived token for MFA setup/confirm only (claim mfa_enrollment=true).
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token cookie (HttpOnly).
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_refresh_token
      description: CSRF cookie used for double-submit validation.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF header used for double-submit validation.
    metricsToken:
      type: apiKey
      in: header
      name: Authorization
      description: "Bearer token for /metrics (Authorization: Bearer <token>)."

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    CsrfFailed:
      description: CSRF validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        msg:
          type: string
        error:
          type: string
      example:
        msg: Invalid credentials
        error: invalid_credentials
    ValidationError:
      type: object
      properties:
        errors:
          type: object
      example:
        errors:
          age: ["Must be greater than or equal to 3."]
    MessageResponse:
      type: object
      properties:
        msg:
          type: string
      example:
        msg: ok
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: ready
        latency_ms:
          type: number
          example: 2.4
    NotReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: not_ready
    RegisterRequest:
      type: object
      required: [username, email, password, user_type]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[A-Za-z0-9._-]{3,32}$"
          example: testuser
        email:
          type: string
          maxLength: 254
          example: test@example.com
        password:
          type: string
          format: password
          example: P4ssw0rd!
        full_name:
          type: string
          example: Test User
        user_type:
          type: string
          enum: [guardian, psychologist]
          description: guardian=padre/tutor, psychologist=psicologo
          example: guardian
        professional_card_number:
          type: string
          description: Required when user_type=psychologist (COLPSIC)
          example: "123456"
    RegisterResponse:
      type: object
      properties:
        msg:
          type: string
          example: user created
        user_id:
          type: string
          format: uuid
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: testuser
        password:
          type: string
          format: password
          example: P4ssw0rd!
    AuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 900
    MFAChallengeResponse:
      type: object
      properties:
        mfa_required:
          type: boolean
          example: true
        challenge_id:
          type: string
          format: uuid
        expires_in:
          type: integer
          example: 300
        error:
          type: string
          example: mfa_required
    MFAEnrollmentResponse:
      type: object
      properties:
        mfa_enrollment_required:
          type: boolean
          example: true
        enrollment_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 600
        msg:
          type: string
          example: MFA enrollment required
        error:
          type: string
          example: mfa_enrollment_required
    LoginMFARequest:
      type: object
      description: Provide either code or recovery_code.
      required: [challenge_id]
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
          description: TOTP code
          example: "123456"
        recovery_code:
          type: string
          description: One-time recovery code
          example: "a1b2c3d4"
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: logged out
    UserProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        full_name:
          type: string
          nullable: true
        user_type:
          type: string
          nullable: true
        professional_card_number:
          type: string
          nullable: true
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string
        mfa_enabled:
          type: boolean
        mfa_confirmed_at:
          type: string
          format: date-time
          nullable: true
        mfa_method:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    UserItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        full_name:
          type: string
          nullable: true
        user_type:
          type: string
        professional_card_number:
          type: string
          nullable: true
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserItem"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    UserCreateRequest:
      type: object
      required: [username, email, password, user_type]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[A-Za-z0-9._-]{3,32}$"
        email:
          type: string
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 8
        full_name:
          type: string
          nullable: true
        user_type:
          type: string
          enum: [guardian, psychologist]
        professional_card_number:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
          nullable: true
        is_active:
          type: boolean
    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          format: password
        full_name:
          type: string
          nullable: true
        user_type:
          type: string
          enum: [guardian, psychologist]
        professional_card_number:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
          nullable: true
        is_active:
          type: boolean
    MFASetupResponse:
      type: object
      properties:
        otpauth_uri:
          type: string
          example: otpauth://totp/CogniaApp:demo?secret=BASE32&issuer=CogniaApp
        secret:
          type: string
          description: Returned only in DEBUG/TESTING
    MFAConfirmRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: "123456"
    MFAConfirmResponse:
      type: object
      properties:
        recovery_codes:
          type: array
          items:
            type: string
          example: ["a1b2c3d4", "e5f6g7h8"]
    MFADisableRequest:
      type: object
      description: Provide password and either code or recovery_code.
      required: [password]
      properties:
        password:
          type: string
          format: password
        code:
          type: string
        recovery_code:
          type: string
    QuestionnaireTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
    QuestionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        text:
          type: string
        response_type:
          type: string
          description: |
            Tipos permitidos:
            - likert_0_4: escala 0-4
            - likert_1_5: escala 1-5
            - boolean: 0/1
            - frequency_0_3: 0=never,1=sometimes,2=often,3=always
            - intensity_0_10: escala 0-10
            - count: conteos (n veces)
            - ordinal: escala ordinal codificada
            - text_context: texto libre solo para contexto (no modelo)
        disorder_id:
          type: string
          format: uuid
          nullable: true
        disorder_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Prefer this field for multi-disorder questions.
        position:
          type: integer
          nullable: true
        response_min:
          type: number
          nullable: true
        response_max:
          type: number
          nullable: true
        response_step:
          type: number
          nullable: true
        response_options:
          type: array
          items:
            oneOf:
              - type: number
              - type: string
          nullable: true
    ActiveQuestionnaireResponse:
      type: object
      properties:
        questionnaire_template:
          $ref: "#/components/schemas/QuestionnaireTemplate"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionItem"
    QuestionnaireCreateRequest:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
        version:
          type: string
        description:
          type: string
          nullable: true
    QuestionnaireCloneRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
    QuestionnaireCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
    QuestionnaireCloneResponse:
      type: object
      properties:
        template_id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        is_active:
          type: boolean
        question_count:
          type: integer
    QuestionCreateRequest:
      type: object
      required: [code, text, response_type]
      properties:
        code:
          type: string
          pattern: "^[A-Za-z0-9_-]{2,64}$"
        text:
          type: string
          minLength: 3
          maxLength: 500
        response_type:
          type: string
          enum:
            - likert_0_4
            - likert_1_5
            - boolean
            - frequency_0_3
            - intensity_0_10
            - count
            - ordinal
            - text_context
          description: See QuestionItem.response_type for scale details.
        disorder_id:
          type: string
          format: uuid
          nullable: true
        disorder_ids:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
        position:
          type: integer
          nullable: true
        response_min:
          type: number
          nullable: true
        response_max:
          type: number
          nullable: true
        response_step:
          type: number
          nullable: true
        response_options:
          type: array
          items:
            oneOf:
              - type: number
              - type: string
          nullable: true
    QuestionCreateListRequest:
      type: array
      items:
        $ref: "#/components/schemas/QuestionCreateRequest"
    QuestionsCreatedResponse:
      type: object
      properties:
        template_id:
          type: string
          format: uuid
        created:
          type: integer
    EvaluationResponseItem:
      type: object
      required: [question_id, value]
      properties:
        question_id:
          type: string
          format: uuid
        value:
          oneOf:
            - type: number
            - type: string
      description: |
        value debe respetar el tipo de la pregunta.
        text_context se guarda como texto pero no se usa en el modelo.
    EvaluationCreateRequest:
      type: object
      required: [age_at_evaluation, evaluation_date, status, responses]
      properties:
        subject_id:
          type: string
          format: uuid
          nullable: true
        age_at_evaluation:
          type: integer
          minimum: 6
          maximum: 11
        evaluation_date:
          type: string
          format: date
        status:
          type: string
          enum: [draft, submitted, completed]
        is_anonymous:
          type: boolean
        context:
          type: string
          nullable: true
        raw_symptoms:
          type: object
          nullable: true
        processed_features:
          type: object
          nullable: true
        access_key:
          type: string
          nullable: true
        responses:
          type: array
          items:
            $ref: "#/components/schemas/EvaluationResponseItem"
    EvaluationCreateResponse:
      type: object
      properties:
        evaluation_id:
          type: string
          format: uuid
        registration_number:
          type: string
        questionnaire_template_id:
          type: string
          format: uuid
        access_key:
          type: string
    PredictRequest:
      type: object
      required:
        - age
        - sex
        - conners_inattention_score
        - conners_hyperactivity
        - cbcl_attention_score
        - sleep_problems
      properties:
        age:
          type: integer
          minimum: 3
          maximum: 21
        sex:
          type: integer
          enum: [0, 1]
          description: 0=f, 1=m
        conners_inattention_score:
          type: number
        conners_hyperactivity:
          type: number
        cbcl_attention_score:
          type: number
        sleep_problems:
          type: integer
          enum: [0, 1]
    PredictResponse:
      type: object
      properties:
        predictions:
          type: object
      example:
        predictions:
          adhd: 0.42
    MetricsResponse:
      type: object
      properties:
        uptime_seconds:
          type: integer
          example: 120
        requests_total:
          type: integer
          example: 57
        latency_ms_avg:
          type: number
          example: 12.34
        latency_ms_max:
          type: number
          example: 120.5
        status_counts:
          type: object
          additionalProperties:
            type: integer
          example:
            "200": 54
            "401": 2
            "500": 1
