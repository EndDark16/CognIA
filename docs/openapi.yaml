      properties:
        id:
          type: string
          format: uuid
        report_code:
          type: string
          example: PRB-20260415-A1B2C3
        reporter_user_id:
          type: string
          format: uuid
        reporter_role:
          type: string
          example: GUARDIAN
        issue_type:
          type: string
          enum: [bug, ui_issue, data_issue, performance, questionnaire, model_result, other]
        description:
          type: string
        status:
          type: string
          enum: [open, triaged, in_progress, resolved, rejected]
        source_module:
          type: string
          nullable: true
        source_path:
          type: string
          nullable: true
        related_questionnaire_session_id:
          type: string
          format: uuid
          nullable: true
        related_questionnaire_history_id:
          type: string
          nullable: true
        admin_notes:
          type: string
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        attachment_count:
          type: integer
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/ProblemReportAttachment"
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    ProblemReportCreateRequest:
      type: object
      required: [issue_type, description]
      properties:
        issue_type:
          type: string
          enum: [bug, ui_issue, data_issue, performance, questionnaire, model_result, other]
        description:
          type: string
          minLength: 10
          maxLength: 4000
        source_module:
          type: string
          maxLength: 120
        source_path:
          type: string
          maxLength: 255
        related_questionnaire_session_id:
          type: string
          format: uuid
        related_questionnaire_history_id:
          type: string
          maxLength: 64
        metadata:
          type: object
          additionalProperties: true
    ProblemReportCreateResponse:
      type: object
      properties:
        report:
          $ref: "#/components/schemas/ProblemReportItem"
    ProblemReportListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProblemReportItem"
        pagination:
          $ref: "#/components/schemas/Pagination"
    ProblemReportDetailResponse:
      type: object
      properties:
        report:
          $ref: "#/components/schemas/ProblemReportItem"
    ProblemReportUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: [open, triaged, in_progress, resolved, rejected]
        admin_notes:
          type: string
          maxLength: 5000

