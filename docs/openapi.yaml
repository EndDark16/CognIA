components:
  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: true
      schema:
        type: string
      description: Must match the csrf_refresh_token cookie value.
    PageParam:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-based).
    PageSizeParam:
      in: query
      name: page_size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page (max 100).
    OrderParam:
      in: query
      name: order
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort order.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token sent in the Authorization header.
    mfaEnrollmentToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived token for MFA setup/confirm only (claim mfa_enrollment=true).
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token cookie (HttpOnly).
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_refresh_token
      description: CSRF cookie used for double-submit validation.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF header used for double-submit validation.
    metricsToken:
      type: apiKey
      in: header
      name: Authorization
      description: "Bearer token for /metrics (Authorization: Bearer <token>)."

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    CsrfFailed:
      description: CSRF validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Locked:
      description: Resource locked
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [msg, error]
      properties:
        msg:
          type: string
          description: Human-readable error message.
        error:
          type: string
          description: Stable error code.
        details:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional structured details (validation fields, limits, etc.).
        errors:
          type: object
          nullable: true
          additionalProperties: true
          deprecated: true
          description: Legacy validation errors shape (predict endpoint).
        trace_id:
          type: string
          nullable: true
          description: Correlation/trace id (if enabled by the platform).
      example:
        msg: Validation error
        error: validation_error
        details:
          email: ["Invalid email format"]
        trace_id: "f3c7c6f1c1a34c6a"
    ValidationError:
      type: object
      deprecated: true
      description: Legacy validation error payload. Prefer ErrorResponse with details.
      properties:
        errors:
          type: object
      example:
        errors:
          age: ["Must be greater than or equal to 3."]
    MessageResponseMsg:
      type: object
      required: [msg]
      properties:
        msg:
          type: string
      example:
        msg: ok
    MessageResponseMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
      example:
        message: ok
    MessageResponse:
      oneOf:
        - $ref: "#/components/schemas/MessageResponseMsg"
        - $ref: "#/components/schemas/MessageResponseMessage"
      description: Some endpoints return `msg` (legacy), others return `message`.
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: ready
        latency_ms:
          type: number
          example: 2.4
    NotReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: not_ready
    RegisterRequest:
      type: object
      required: [username, email, password, user_type]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[A-Za-z0-9._-]{3,32}$"
          example: testuser
        email:
          type: string
          maxLength: 254
          format: email
          example: test@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          example: P4ssw0rd!
        full_name:
          type: string
          maxLength: 120
          example: Test User
        user_type:
          type: string
          enum: [guardian, psychologist]
          description: guardian=padre/tutor, psychologist=psicologo
          example: guardian
        professional_card_number:
          type: string
          description: Required when user_type=psychologist (COLPSIC)
          pattern: "^[A-Za-z0-9-]{4,32}$"
          example: "123456"
    RegisterResponse:
      type: object
      properties:
        msg:
          type: string
          example: user created
        user_id:
          type: string
          format: uuid
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
