openapi: 3.0.3
info:
  title: CognIA API
  version: 0.1.0
  description: |
    API backend de la tesis "Aplicativo web con Random Forest para la alerta temprana
    de cinco trastornos psicologicos en ninos de 6 a 11 anos".
    Proyecto academico del programa de Ingenieria de Sistemas y Computacion en la
    Universidad de Cundinamarca (grupo GISTFA).
    Esta API genera alertas de riesgo y no representa un diagnostico clinico.
    Trabaja solo con datos simulados o anonimizados.

    Enfoque de seguridad y buenas practicas:
    - Auth: JWT access token en JSON; refresh token en cookie HttpOnly con path
      /api/auth/refresh.
    - CSRF: double-submit con header X-CSRF-Token y cookie csrf_refresh_token; la
      cookie rota en refresh.
    - MFA: TOTP con secreto cifrado y recovery codes; obligatorio para roles
      privilegiados.
    - Observabilidad: /healthz (liveness), /readyz (DB readiness), /metrics (token
      opcional, por proceso).

    Notas:
    - Si usas cookies, define CORS_ORIGINS explicitos y envia credenciales.
    - /api/predict es experimental y puede cambiar.

    Creditos:
    - Andres Felipe Melo Chaguala (estudiante investigador)
    - Johan Thomas Cristancho Silva (estudiante investigador)
    - Oscar Jobany Gomez Ochoa (director)
    - Universidad de Cundinamarca, grupo GISTFA
servers:
  - url: /
    description: Same-origin (use the host that serves /docs)
  - url: http://127.0.0.1:5000
    description: Local development (IPv4)
  - url: http://localhost:5000
    description: Local development (hostname)

tags:
  - name: Health
    description: Liveness, readiness, and basic metrics.
  - name: Auth
    description: Registration, login, refresh, and logout using JWT in cookies.
  - name: MFA
    description: TOTP setup, confirmation, recovery codes, and disable.
  - name: Email
    description: Email unsubscribe utilities.
  - name: Admin
    description: Admin operations (users, audits, content, evaluations).
  - name: Users
    description: Admin user management.
  - name: Questionnaires
    description: Questionnaire templates and active template retrieval.
  - name: Evaluations
    description: Create evaluations using the active questionnaire.
  - name: Predict
    description: Experimental model inference (placeholder).
  - name: QuestionnaireRuntime
    description: Runtime v1 questionnaire flows for draft/save/submit/results and professional access.
  - name: QuestionnaireRuntimeAdmin
    description: Runtime v1 questionnaire governance endpoints for template/version publishing.
  - name: QuestionnaireV2
    description: Operational v2 questionnaire sessions, history, tags, share codes and PDF artifacts.
  - name: Dashboard
    description: Operational and adoption dashboard endpoints (v2).
  - name: Reports
    description: Reporting job endpoints (v2).
  - name: Docs
    description: OpenAPI spec and Swagger UI endpoints.

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      description: |
        Objetivo funcional: Verificar liveness del servicio. Ruta y metodo: GET /healthz. Seguridad:
        no declara requisitos de seguridad a nivel OpenAPI para esta operacion. Parametros de
        entrada: no define parametros de ruta, consulta, header ni cookie en el contrato de la
        operacion. Cuerpo de solicitud: no aplica para esta operacion segun la especificacion
        actual. Respuestas documentadas: exito 200.
      operationId: getLiveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check (DB)
      description: |
        Objetivo funcional: Verificar readiness con conectividad a base de datos. Ruta y metodo: GET
        /readyz. Seguridad: no declara requisitos de seguridad a nivel OpenAPI para esta operacion.
        Parametros de entrada: no define parametros de ruta, consulta, header ni cookie en el
        contrato de la operacion. Cuerpo de solicitud: no aplica para esta operacion segun la
        especificacion actual. Respuestas documentadas: exito 200; error 503.
      operationId: getReadiness
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotReadyResponse"

  /metrics:
    get:
      tags: [Health]
      summary: Metrics snapshot (in-memory)
      description: |
        Objetivo funcional: Consultar metrica en memoria del proceso. Ruta y metodo: GET /metrics.
        Seguridad: este endpoint admite acceso sin credencial o con token metricsToken cuando la
        configuracion de metricas protegidas esta habilitada. Parametros de entrada: no define
        parametros de ruta, consulta, header ni cookie en el contrato de la operacion. Cuerpo de
        solicitud: no aplica para esta operacion segun la especificacion actual. Respuestas
        documentadas: exito 200; error 401, 404, 500.
      operationId: getMetrics
      security:
        - metricsToken: []
        - {}
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Metrics disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMsg"
              examples:
                disabled:
                  summary: Disabled
                  value:
                    msg: Metrics disabled
        "500":
          $ref: "#/components/responses/ServerError"

  /api/predict:
    post:
      tags: [Predict]
      summary: Run prediction (experimental)
      description: |
        Objetivo funcional: Ejecutar prediccion experimental. Ruta y metodo: POST /api/predict.
        Seguridad: no declara requisitos de seguridad a nivel OpenAPI para esta operacion.
        Parametros de entrada: no define parametros de ruta, consulta, header ni cookie en el
        contrato de la operacion. Cuerpo de solicitud: obligatorio; formatos admitidos:
        application/json (schema PredictRequest). Respuestas documentadas: exito 200; error 400,
        500. Estado del endpoint: marcado como deprecated; mantener solo para compatibilidad legacy
        y planificar migracion.
      operationId: createPrediction
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictRequest"
            examples:
              typical:
                summary: Typical input
                value:
                  age: 10
                  sex: 1
                  conners_inattention_score: 12.5
                  conners_hyperactivity: 8.1
                  cbcl_attention_score: 14.0
                  sleep_problems: 0
              edge:
                summary: Edge of valid range
                value:
                  age: 3
                  sex: 0
                  conners_inattention_score: 0.0
                  conners_hyperactivity: 0.0
                  cbcl_attention_score: 0.0
                  sleep_problems: 1
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictResponse"
              examples:
                typical:
                  summary: Typical prediction
                  value:
                    predictions:
                      adhd: 0.42
                      anxiety: 0.18
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_payload:
                  summary: Missing required fields
                  value:
                    msg: Validation error
                    error: validation_error
                    errors:
                      age: ["Missing data for required field."]
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      description: |
        Objetivo funcional: Registrar un usuario nuevo. Ruta y metodo: POST /api/auth/register.
        Seguridad: no declara requisitos de seguridad a nivel OpenAPI para esta operacion.
        Parametros de entrada: no define parametros de ruta, consulta, header ni cookie en el
        contrato de la operacion. Cuerpo de solicitud: obligatorio; formatos admitidos:
        application/json (schema RegisterRequest). Respuestas documentadas: exito 201; error 400,
        409, 429, 500.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              guardian:
                summary: Guardian registration
                value:
                  username: guardian_01
                  email: guardian@example.com
                  password: "P4ssw0rd!"
                  full_name: Maria Perez
                  user_type: guardian
              psychologist:
                summary: Psychologist registration
                value:
                  username: dr_gomez
                  email: dr.gomez@example.com
                  password: "P4ssw0rd!"
                  full_name: Oscar Gomez
                  user_type: psychologist
                  professional_card_number: "COLPSIC-12345"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              examples:
                created:
                  summary: Registered
                  value:
                    msg: user created
                    user_id: "b28e6f7e-2c88-4a31-9c2f-0f35e33b2c4a"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login (password)
      description: |
        Objetivo funcional: Autenticar usuario con credenciales. Ruta y metodo: POST
        /api/auth/login. Seguridad: no declara requisitos de seguridad a nivel OpenAPI para esta
        operacion. Parametros de entrada: no define parametros de ruta, consulta, header ni cookie
        en el contrato de la operacion. Cuerpo de solicitud: obligatorio; formatos admitidos:
        application/json (schema LoginRequest). Respuestas documentadas: exito 200; error 400, 401,
        403, 423, 429, 500.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              typical:
                summary: Username/password
                value:
                  username: guardian_01
                  password: "P4ssw0rd!"
      responses:
        "200":
          description: Access token or MFA challenge
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthTokenResponse"
                  - $ref: "#/components/schemas/MFAChallengeResponse"
                  - $ref: "#/components/schemas/MFAEnrollmentResponse"
              examples:
                token:
                  summary: Access token response
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
                mfa_challenge:
                  summary: MFA challenge response
                  value:
                    mfa_required: true
                    challenge_id: "<uuid>"
                    expires_in: 300
                    error: mfa_required
                mfa_enrollment:
                  summary: MFA enrollment response
                  value:
                    mfa_enrollment_required: true
                    enrollment_token: "<jwt>"
                    token_type: bearer
                    expires_in: 600
                    msg: MFA enrollment required
                    error: mfa_enrollment_required
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "423":
          $ref: "#/components/responses/Locked"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login/mfa:
    post:
      tags: [Auth]
      summary: Complete MFA login
      description: |
        Objetivo funcional: Completar inicio de sesion con MFA. Ruta y metodo: POST
        /api/auth/login/mfa. Seguridad: no declara requisitos de seguridad a nivel OpenAPI para esta
        operacion. Parametros de entrada: no define parametros de ruta, consulta, header ni cookie
        en el contrato de la operacion. Cuerpo de solicitud: obligatorio; formatos admitidos:
        application/json (schema LoginMFARequest). Respuestas documentadas: exito 200; error 400,
        401, 403, 429, 500.
      operationId: completeMfaLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginMFARequest"
            examples:
              totp:
                summary: TOTP code
                value:
                  challenge_id: "5f6c5f8f-2f7f-4c57-97f2-9f9e38c8d1d1"
                  code: "123456"
              recovery:
                summary: Recovery code
                value:
                  challenge_id: "5f6c5f8f-2f7f-4c57-97f2-9f9e38c8d1d1"
                  recovery_code: "a1b2c3d4"
      responses:
        "200":
          description: Access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              examples:
                token:
                  summary: Access token
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Objetivo funcional: Renovar token de acceso. Ruta y metodo: POST /api/auth/refresh.
        Seguridad: requiere refresh_token en cookie HttpOnly y validacion CSRF con cookie
        csrf_refresh_token mas header X-CSRF-Token (double-submit). Parametros de entrada -> header:
        X-CSRF-Token (requerido). Cuerpo de solicitud: no aplica para esta operacion segun la
        especificacion actual. Respuestas documentadas: exito 200; error 401, 403, 500.
      operationId: refreshSession
      security:
        - cookieAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: New access token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token rotated + csrf_refresh_token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              examples:
                token:
                  summary: Refreshed token
                  value:
                    access_token: "<jwt>"
                    token_type: bearer
                    expires_in: 900
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh tokens)
      description: |
        Objetivo funcional: Cerrar sesion y revocar refresh tokens. Ruta y metodo: POST
        /api/auth/logout. Seguridad: requiere bearerAuth y control CSRF (csrf_refresh_token +
        X-CSRF-Token) para evitar ejecucion cruzada no autorizada. Parametros de entrada -> header:
        X-CSRF-Token (requerido). Cuerpo de solicitud: no aplica para esta operacion segun la
        especificacion actual. Respuestas documentadas: exito 200; error 401, 403, 500.
      operationId: logoutUser
      security:
        - bearerAuth: []
          csrfCookie: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
              description: auth cookies cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                logged_out:
                  summary: Logged out
                  value:
                    message: logged out
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfFailed"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      description: |
        Objetivo funcional: Obtener perfil del usuario autenticado. Ruta y metodo: GET /api/auth/me.
        Seguridad: requiere autenticacion bearerAuth con JWT de acceso valido. Parametros de
        entrada: no define parametros de ruta, consulta, header ni cookie en el contrato de la
        operacion. Cuerpo de solicitud: no aplica para esta operacion segun la especificacion
        actual. Respuestas documentadas: exito 200; error 401, 403, 404, 500.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/change:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      description: |
        Objetivo funcional: Cambiar contrasena del usuario autenticado. Ruta y metodo: POST
        /api/auth/password/change. Seguridad: requiere autenticacion bearerAuth con JWT de acceso
        valido. Parametros de entrada: no define parametros de ruta, consulta, header ni cookie en
        el contrato de la operacion. Cuerpo de solicitud: obligatorio; formatos admitidos:
        application/json (schema PasswordChangeRequest). Respuestas documentadas: exito 200; error
        400, 401, 403, 404, 429, 500.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
            examples:
              typical:
                summary: Change password
                value:
                  currentPassword: "P4ssw0rd!"
                  newPassword: "N3wP4ssw0rd!"
                  confirmNewPassword: "N3wP4ssw0rd!"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                updated:
                  summary: Updated
                  value:
                    message: Password updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Request password reset (public)
      description: |
        Objetivo funcional: Solicitar reinicio de contrasena en flujo publico. Ruta y metodo: POST
        /api/auth/password/forgot. Seguridad: no declara requisitos de seguridad a nivel OpenAPI
        para esta operacion. Parametros de entrada: no define parametros de ruta, consulta, header
        ni cookie en el contrato de la operacion. Cuerpo de solicitud: obligatorio; formatos
        admitidos: application/json (schema PasswordForgotRequest). Respuestas documentadas: exito
        200; error 429, 500.
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordForgotRequest"
            examples:
              typical:
                summary: Password reset request
                value:
                  email: guardian@example.com
      responses:
        "200":
          description: Generic response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                accepted:
                  summary: Accepted
                  value:
                    message: If the email exists, a reset link has been sent
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password with token (public)
      description: |
        Objetivo funcional: Restablecer contrasena usando token de recuperacion. Ruta y metodo: POST
        /api/auth/password/reset. Seguridad: no declara requisitos de seguridad a nivel OpenAPI para
        esta operacion. Parametros de entrada: no define parametros de ruta, consulta, header ni
        cookie en el contrato de la operacion. Cuerpo de solicitud: obligatorio; formatos admitidos:
        application/json (schema PasswordResetRequest). Respuestas documentadas: exito 200; error
        400, 429, 500.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
            examples:
              typical:
                summary: Reset with token
                value:
                  token: "reset-token-123"
                  newPassword: "N3wP4ssw0rd!"
                  confirmNewPassword: "N3wP4ssw0rd!"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                updated:
                  summary: Updated
                  value:
                    message: Password updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/password/reset/verify:
    get:
      tags: [Auth]
      summary: Verify password reset token
      description: |
        Objetivo funcional: Validar token de recuperacion de contrasena. Ruta y metodo: GET
        /api/auth/password/reset/verify. Seguridad: no declara requisitos de seguridad a nivel
        OpenAPI para esta operacion. Parametros de entrada -> consulta: token (requerido). Cuerpo de
        solicitud: no aplica para esta operacion segun la especificacion actual. Respuestas
        documentadas: exito 200; error 400, 429, 500.
      operationId: verifyResetToken
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetVerifyResponse"
              examples:
                valid:
                  summary: Valid token
                  value:
                    valid: true
        "400":
          description: Token invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetVerifyResponse"
              examples:
                invalid:
                  summary: Invalid token
                  value:
                    valid: false
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/email/unsubscribe:
    get:
      tags: [Email]
      summary: Unsubscribe from emails (token)
      description: |
        Objetivo funcional: Registrar desuscripcion de correos con token firmado. Ruta y metodo: GET
        /api/email/unsubscribe. Seguridad: no declara requisitos de seguridad a nivel OpenAPI para
        esta operacion. Parametros de entrada -> consulta: token (requerido), reason. Cuerpo de
        solicitud: no aplica para esta operacion segun la especificacion actual. Respuestas
        documentadas: exito 200; error 400, 429, 500.
      operationId: unsubscribeEmail
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
            minLength: 10
            maxLength: 512
        - in: query
          name: reason
          required: false
          schema:
            type: string
            maxLength: 200
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponseMessage"
              examples:
                success:
                  summary: Unsubscribed
                  value:
                    message: Unsubscribed
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags: [Email]
      summary: Unsubscribe from emails (token, one-click)
      description: |
        Objetivo funcional: Registrar desuscripcion one-click por POST. Ruta y metodo: POST
        /api/email/unsubscribe. Seguridad: no declara requisitos de seguridad a nivel OpenAPI para
        esta operacion. Parametros de entrada: no define parametros de ruta, consulta, header ni
        cookie en el contrato de la operacion. Cuerpo de solicitud: opcional; formatos admitidos:
