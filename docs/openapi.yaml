        conners_inattention_score:
          type: number
        conners_hyperactivity:
          type: number
        cbcl_attention_score:
          type: number
        sleep_problems:
          type: integer
          enum: [0, 1]
    PredictResponse:
      type: object
      properties:
        predictions:
          type: object
      example:
        predictions:
          adhd: 0.42
    MetricsResponse:
      type: object
      properties:
        uptime_seconds:
          type: integer
