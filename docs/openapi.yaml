openapi: 3.0.3
info:
  title: CognIA Backend API
  version: 2026-03-29-openapi-final
  description: |
    API backend de CognIA para autenticación, administración, cuestionarios, evaluaciones, reportes y paneles operativos.

    Esta especificación describe el contrato HTTP del backend tal como debe consumirse desde frontend, backoffice, QA e integraciones controladas.
    Está escrita para humanos: explica qué hace cada endpoint, cuándo debe usarse, qué espera, qué devuelve y por qué puede fallar.

    Cobertura principal:
    - autenticación con JWT, refresh token por cookie y MFA;
    - administración de usuarios, psicólogos, auditoría, métricas y salud de correo;
    - flujo clásico v1 de usuarios, cuestionarios y evaluaciones;
    - flujo questionnaire-runtime v1 para borradores, secciones, submit y acceso profesional;
    - flujo questionnaire-v2 para sesiones, historial, resultados, PDF, tags y enlaces compartidos;
    - dashboards y trabajos de reporte;
    - reporte de problemas;
    - endpoint experimental o legacy de predicción.

    Aclaración metodológica:
    Los resultados entregados por CognIA son de apoyo operativo y de screening temprano. No constituyen diagnóstico clínico automático.

    Gobernanza de contrato:
    - `docs/openapi.yaml` es la fuente oficial del Swagger servido por el backend.
    - Existen rutas vigentes, rutas legacy y rutas internas. Cada operación declara `x-contract-status`.
servers:
- url: /
  description: Same-origin (use the host that serves /docs)
- url: http://127.0.0.1:5000
  description: Local development (IPv4)
- url: http://localhost:5000
  description: Local development (hostname)
tags:
- name: Health
  description: Salud del proceso, readiness, documentación servida y métricas técnicas de proceso.
- name: Auth
  description: Registro, login, refresh, logout, perfil y recuperación de contraseña.
- name: MFA
  description: Enrolamiento, confirmación y desactivación de autenticación multifactor TOTP.
- name: Email
  description: Flujos de desuscripción y estado de correo.
- name: Admin
  description: 'Gobierno administrativo del backend: usuarios, psicólogos, auditoría, métricas y correo.'
- name: Users
  description: Contrato legacy v1 para gestión de usuarios.
- name: Questionnaires
  description: Contrato clásico v1 de plantillas y preguntas.
- name: Evaluations
  description: Contrato clásico v1 de evaluaciones.
- name: Predict
  description: Endpoint experimental o legado de inferencia directa.
- name: QuestionnaireRuntime
  description: Flujo runtime v1 de borradores, submit, resultados y acceso profesional.
- name: QuestionnaireRuntimeAdmin
  description: Gobierno administrativo del runtime v1.
- name: QuestionnaireV2
  description: Flujo activo de sesiones, historial, resultados, PDF, tags y compartición.
- name: Dashboard
  description: Agregados operativos de dashboards.
- name: Reports
  description: Creación de trabajos de reporte a partir de dashboards.
- name: Docs
  description: Recursos del propio Swagger/OpenAPI servidos por la aplicación.
paths:
  /healthz:
    get:
      tags:
      - Health
      summary: Verificar que el proceso HTTP de la API sigue vivo
      description: |-
        Qué hace:
        Verificar que el proceso HTTP de la API sigue vivo.

        Cuándo usarlo:
        Debe invocarse cuando el cliente necesita exactamente este paso del flujo publicado por la API en la ruta `GET /healthz`.

        Quién lo usa:
        Lo consume típicamente infraestructura, monitoreo, QA o desarrolladores.

        Seguridad:
        Público. No requiere JWT ni cookies.

        Entrada esperada:
        No usa requestBody en el contrato auditado.

        Reglas obligatorias:
        No recibe request body y se consume tal como está publicado por el backend.

        Resultado exitoso:
        Devuelve el recurso o agregado solicitado con la estructura que el frontend o backoffice espera consumir.

        Errores posibles:
        Este endpoint documenta explícitamente los códigos 200. Cada código debe interpretarse con la causa funcional descrita en la sección de respuestas, no como un fallo genérico reutilizable.

        Limitaciones actuales:
        La documentación se alinea con el comportamiento observable del backend y evita prometer capacidades no confirmadas por el contrato auditado.

        Estado contractual:
        `ACTIVE`
      operationId: getLiveness
      responses:
        '200':
          description: Devuelve el recurso o agregado solicitado con la estructura que el frontend o backoffice espera consumir.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      x-contract-status: ACTIVE
  /readyz:
    get:
      tags:
      - Health
      summary: Verificar si la API está lista para operar con base de datos
      description: |-
        Qué hace:
        Verificar si la API está lista para operar con base de datos.

        Cuándo usarlo:
        Debe invocarse cuando el cliente necesita exactamente este paso del flujo publicado por la API en la ruta `GET /readyz`.

        Quién lo usa:
        Lo consume típicamente infraestructura, monitoreo, QA o desarrolladores.

        Seguridad:
        Público. No requiere JWT ni cookies.

        Entrada esperada:
        No usa requestBody en el contrato auditado.

        Reglas obligatorias:
        No recibe request body y se consume tal como está publicado por el backend.

        Resultado exitoso:
        Devuelve el recurso o agregado solicitado con la estructura que el frontend o backoffice espera consumir.

        Errores posibles:
        Este endpoint documenta explícitamente los códigos 200, 503. Cada código debe interpretarse con la causa funcional descrita en la sección de respuestas, no como un fallo genérico reutilizable.

        Limitaciones actuales:
        La documentación se alinea con el comportamiento observable del backend y evita prometer capacidades no confirmadas por el contrato auditado.

        Estado contractual:
        `ACTIVE`
      operationId: getReadiness
      responses:
        '200':
          description: Devuelve el recurso o agregado solicitado con la estructura que el frontend o backoffice espera consumir.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: La aplicación está viva, pero una dependencia crítica no está disponible para completar la operación.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotReadyResponse'
              examples:
                error_503:
                  value:
                    msg: service unavailable while processing readyz
                    error: service_unavailable
      x-contract-status: ACTIVE
  /metrics:
    get:
      tags:
      - Health
      summary: Obtener un snapshot de métricas en memoria del proceso actual
      description: |-
        Qué hace:
        Obtener un snapshot de métricas en memoria del proceso actual.

        Cuándo usarlo:
        Debe invocarse cuando el cliente necesita exactamente este paso del flujo publicado por la API en la ruta `GET /metrics`.

        Quién lo usa:
        Lo consume típicamente infraestructura, monitoreo, QA o desarrolladores.

        Seguridad:
        Puede ser público o exigir token de métricas según configuración del entorno.

        Entrada esperada:
        No usa requestBody en el contrato auditado.

        Reglas obligatorias:
        No recibe request body y se consume tal como está publicado por el backend.

        Resultado exitoso:
        Devuelve el recurso o agregado solicitado con la estructura que el frontend o backoffice espera consumir.

        Errores posibles:
        Este endpoint documenta explícitamente los códigos 200, 401, 404, 500. Cada código debe interpretarse con la causa funcional descrita en la sección de respuestas, no como un fallo genérico reutilizable.

        Limitaciones actuales:
        La documentación se alinea con el comportamiento observable del backend y evita prometer capacidades no confirmadas por el contrato auditado.

        Estado contractual:
        `ACTIVE`
      operationId: getMetrics
      security:
      - metricsToken: []
      - {}
      responses:
        '200':
          description: Devuelve el recurso o agregado solicitado con la estructura que el frontend o backoffice espera consumir.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_401:
                  value:
                    msg: unauthorized
                    error: unauthorized
          description: No existe autenticación válida, el token expiró o la credencial enviada no es aceptada por el backend.
        '404':
          description: El recurso objetivo no existe, no está habilitado en este entorno o no es visible para el actor actual.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseMsg'
              examples:
                disabled:
                  summary: Disabled
                  value:
                    msg: Metrics disabled
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_500:
                  value:
                    msg: internal failure while processing metrics
                    error: server_error
          description: El backend encontró una falla interna durante consulta, persistencia, generación, inferencia o coordinación
            del flujo.
      x-contract-status: ACTIVE
  /api/predict:
    post:
      tags:
      - Predict
      summary: Ejecutar la inferencia experimental o legado del payload clásico de predicción
      description: |-
        Qué hace:
        Ejecutar la inferencia experimental o legado del payload clásico de predicción.

        Cuándo usarlo:
        Debe invocarse cuando el cliente necesita exactamente este paso del flujo publicado por la API en la ruta `POST /api/predict`.

        Quién lo usa:
        Lo consume típicamente infraestructura, monitoreo, QA o desarrolladores.

        Seguridad:
        No requiere autenticación explícita en el contrato actual.

        Entrada esperada:
        Request body obligatorio. Formatos admitidos: application/json. Schema principal: PredictRequest.

        Reglas obligatorias:
        El body debe cumplir el schema `PredictRequest` y sus restricciones de tipos, obligatoriedad, enums, rangos y formatos. El payload debe incluir exactamente las features requeridas por el modelo clásico cargado en el entorno.

        Resultado exitoso:
        Crea o ejecuta correctamente la acción de negocio y devuelve el estado resultante o el recurso creado.

        Errores posibles:
        Este endpoint documenta explícitamente los códigos 200, 400, 500. Cada código debe interpretarse con la causa funcional descrita en la sección de respuestas, no como un fallo genérico reutilizable.

        Limitaciones actuales:
        Este endpoint está mantenido por compatibilidad o pruebas. El flujo recomendado de producto vive en questionnaire-v2.

        Estado contractual:
        `DEPRECATED`
      operationId: createPrediction
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredictRequest'
            examples:
              typical:
                summary: Typical input
                value:
                  age: 10
                  sex: 1
                  conners_inattention_score: 12.5
                  conners_hyperactivity: 8.1
                  cbcl_attention_score: 14.0
                  sleep_problems: 0
              edge:
                summary: Edge of valid range
                value:
                  age: 3
                  sex: 0
                  conners_inattention_score: 0.0
                  conners_hyperactivity: 0.0
                  cbcl_attention_score: 0.0
                  sleep_problems: 1
      responses:
        '200':
          description: Crea o ejecuta correctamente la acción de negocio y devuelve el estado resultante o el recurso creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictResponse'
              examples:
                typical:
                  summary: Typical prediction
                  value:
                    predictions:
                      adhd: 0.42
                      anxiety: 0.18
        '400':
          description: La solicitud no cumple validaciones de formato, campos obligatorios, enums, rangos o reglas de negocio
            del endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_payload:
                  summary: Missing required fields
                  value:
                    msg: Validation error
                    error: validation_error
                    errors:
                      age:
                      - Missing data for required field.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_500:
                  value:
                    msg: internal failure while processing api_predict
                    error: server_error
          description: El backend encontró una falla interna durante consulta, persistencia, generación, inferencia o coordinación
            del flujo.
      x-contract-status: DEPRECATED
  /api/auth/register:
    post:
      tags:
      - Auth
      summary: Registrar una nueva cuenta de tutor o psicólogo
      description: |-
        Qué hace:
        Registrar una nueva cuenta de tutor o psicólogo.

        Cuándo usarlo:
        Debe invocarse cuando el cliente necesita exactamente este paso del flujo publicado por la API en la ruta `POST /api/auth/register`.

        Quién lo usa:
        Lo consume típicamente frontend público o frontend autenticado, según la operación.

        Seguridad:
        No requiere autenticación explícita en el contrato actual.

        Entrada esperada:
        Request body obligatorio. Formatos admitidos: application/json. Schema principal: RegisterRequest.

        Reglas obligatorias:
        El body debe cumplir el schema `RegisterRequest` y sus restricciones de tipos, obligatoriedad, enums, rangos y formatos. Username y email deben ser únicos; para cuentas de psicólogo la tarjeta profesional debe ser coherente con el alta.

        Resultado exitoso:
        Crea o ejecuta correctamente la acción de negocio y devuelve el estado resultante o el recurso creado.

        Errores posibles:
        Este endpoint documenta explícitamente los códigos 201, 400, 409, 429, 500. Cada código debe interpretarse con la causa funcional descrita en la sección de respuestas, no como un fallo genérico reutilizable.

        Limitaciones actuales:
        La documentación se alinea con el comportamiento observable del backend y evita prometer capacidades no confirmadas por el contrato auditado.

        Estado contractual:
        `ACTIVE`
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              guardian:
                summary: Guardian registration
                value:
                  username: guardian_01
                  email: guardian@example.com
                  password: P4ssw0rd!
                  full_name: Maria Perez
                  user_type: guardian
              psychologist:
                summary: Psychologist registration
                value:
                  username: dr_gomez
                  email: dr.gomez@example.com
                  password: P4ssw0rd!
                  full_name: Oscar Gomez
                  user_type: psychologist
                  professional_card_number: COLPSIC-12345
      responses:
        '201':
          description: La operación de creación o bootstrap se completó correctamente y el backend devuelve el recurso creado
            o su metadata operativa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              examples:
                created:
                  summary: Registered
                  value:
                    msg: user created
                    user_id: b28e6f7e-2c88-4a31-9c2f-0f35e33b2c4a
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_400:
                  value:
                    msg: request validation failed for api_auth_register
                    error: invalid_api_auth_register
          description: La solicitud no cumple validaciones de formato, campos obligatorios, enums, rangos o reglas de negocio
            del endpoint.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_409:
                  value:
                    msg: conflict while processing api_auth_register
                    error: api_auth_register_conflict
          description: La operación entra en conflicto con el estado actual del recurso o con una restricción de unicidad,
            transición o concurrencia.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_429:
                  value:
                    msg: rate limit exceeded for api_auth_register
                    error: rate_limited
          description: Se superó el límite de solicitudes permitido por la política de protección del backend.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_500:
                  value:
                    msg: internal failure while processing api_auth_register
                    error: server_error
          description: El backend encontró una falla interna durante consulta, persistencia, generación, inferencia o coordinación
            del flujo.
      x-contract-status: ACTIVE
  /api/auth/login:
    post:
      tags:
      - Auth
      summary: Iniciar sesión con credenciales y resolver si el flujo requiere MFA
      description: |-
        Qué hace:
        Iniciar sesión con credenciales y resolver si el flujo requiere MFA.

        Cuándo usarlo:
        Debe invocarse cuando el cliente necesita exactamente este paso del flujo publicado por la API en la ruta `POST /api/auth/login`.

        Quién lo usa:
        Lo consume típicamente frontend público o frontend autenticado, según la operación.

        Seguridad:
        No requiere autenticación explícita en el contrato actual.

        Entrada esperada:
        Request body obligatorio. Formatos admitidos: application/json. Schema principal: LoginRequest.

        Reglas obligatorias:
        El body debe cumplir el schema `LoginRequest` y sus restricciones de tipos, obligatoriedad, enums, rangos y formatos. La cuenta debe existir, estar habilitada y cumplir las reglas de MFA o revisión profesional que apliquen.

        Resultado exitoso:
        Crea o ejecuta correctamente la acción de negocio y devuelve el estado resultante o el recurso creado.

        Errores posibles:
        Este endpoint documenta explícitamente los códigos 200, 400, 401, 403, 423, 429, 500. Cada código debe interpretarse con la causa funcional descrita en la sección de respuestas, no como un fallo genérico reutilizable.

        Limitaciones actuales:
        La documentación se alinea con el comportamiento observable del backend y evita prometer capacidades no confirmadas por el contrato auditado.

        Estado contractual:
        `ACTIVE`
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              typical:
                summary: Username/password
                value:
                  username: guardian_01
                  password: P4ssw0rd!
      responses:
        '200':
          description: Crea o ejecuta correctamente la acción de negocio y devuelve el estado resultante o el recurso creado.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token (HttpOnly) + csrf_refresh_token
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/AuthTokenResponse'
                - $ref: '#/components/schemas/MFAChallengeResponse'
                - $ref: '#/components/schemas/MFAEnrollmentResponse'
              examples:
                token:
                  summary: Access token response
                  value:
                    access_token: <jwt>
                    token_type: bearer
                    expires_in: 900
                mfa_challenge:
                  summary: MFA challenge response
                  value:
                    mfa_required: true
                    challenge_id: <uuid>
                    expires_in: 300
                    error: mfa_required
                mfa_enrollment:
                  summary: MFA enrollment response
                  value:
                    mfa_enrollment_required: true
                    enrollment_token: <jwt>
                    token_type: bearer
                    expires_in: 600
                    msg: MFA enrollment required
                    error: mfa_enrollment_required
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_400:
                  value:
                    msg: request validation failed for api_auth_login
                    error: invalid_api_auth_login
          description: La solicitud no cumple validaciones de formato, campos obligatorios, enums, rangos o reglas de negocio
            del endpoint.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_401:
                  value:
                    msg: unauthorized
                    error: unauthorized
          description: No existe autenticación válida, el token expiró o la credencial enviada no es aceptada por el backend.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_403:
                  value:
                    msg: access denied for api_auth_login
                    error: forbidden_api_auth_login
          description: La cuenta está autenticada pero no tiene permiso suficiente, o falló una regla adicional de seguridad,
            ownership o acceso.
        '423':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_423:
                  value:
                    msg: resource temporarily locked for api_auth_login
                    error: api_auth_login_locked
          description: La cuenta o recurso se encuentra temporalmente bloqueado.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_429:
                  value:
                    msg: rate limit exceeded for api_auth_login
                    error: rate_limited
          description: Se superó el límite de solicitudes permitido por la política de protección del backend.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_500:
                  value:
                    msg: internal failure while processing api_auth_login
                    error: server_error
          description: El backend encontró una falla interna durante consulta, persistencia, generación, inferencia o coordinación
            del flujo.
      x-contract-status: ACTIVE
