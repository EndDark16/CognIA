openapi: 3.0.3
info:
  title: CognIA API
  version: 0.1.0
  description: 'API backend de CognIA para soporte de screening y alerta temprana en salud mental infantil (6 a 11 anos) en
    entorno academico simulado.


    Alcance funcional:

    - Auth JWT + MFA, usuarios/admin, cuestionarios v1/runtime v1/v2, dashboards, reportes y problem reports.

    - Contratos legacy documentados con estado contractual explicito.


    Caveat clinico:

    - La API genera alertas de riesgo para screening/apoyo profesional.

    - No es diagnostico clinico automatico ni definitivo.


    Seguridad:

    - JWT/cookies segun endpoint, CSRF en refresh y rate limits por endpoint critico.

    - Endpoints admin restringidos por rol ADMIN.

    - Errores endurecidos sin fuga de detalles sensibles.'
servers:
- url: /
  description: Same-origin (use the host that serves /docs)
- url: http://127.0.0.1:5000
  description: Local development (IPv4)
- url: http://localhost:5000
  description: Local development (hostname)
tags:
- name: Health
  description: Liveness, readiness, and basic metrics.
- name: Auth
  description: Registration, login, refresh, and logout using JWT in cookies.
- name: MFA
  description: TOTP setup, confirmation, recovery codes, and disable.
- name: Email
  description: Email unsubscribe utilities.
- name: Admin
  description: Admin operations (users, audits, content, evaluations).
- name: Users
  description: Admin user management.
- name: Questionnaires
  description: Questionnaire templates and active template retrieval.
- name: Evaluations
  description: Create evaluations using the active questionnaire.
- name: Predict
  description: Experimental model inference (placeholder).
- name: QuestionnaireRuntime
  description: Runtime v1 questionnaire flows for draft/save/submit/results and professional access.
- name: QuestionnaireRuntimeAdmin
  description: Runtime v1 questionnaire governance endpoints for template/version publishing.
- name: QuestionnaireV2
  description: Operational v2 questionnaire sessions, history, tags, share codes and PDF artifacts.
- name: Dashboard
  description: Operational and adoption dashboard endpoints (v2).
- name: Reports
  description: Reporting job endpoints (v2).
- name: ProblemReports
  description: Registro y seguimiento de reportes de problema.
- name: Docs
  description: OpenAPI spec and Swagger UI endpoints.
- name: Misc
  description: Endpoints no clasificados explicitamente.
