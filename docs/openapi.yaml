        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
        full_name:
          type: string
          nullable: true
          maxLength: 120
        user_type:
          type: string
          enum: [guardian, psychologist]
        professional_card_number:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
          nullable: true
        is_active:
          type: boolean
    MFASetupResponse:
      type: object
      properties:
        otpauth_uri:
          type: string
          example: otpauth://totp/CogniaApp:demo?secret=BASE32&issuer=CogniaApp
        secret:
          type: string
          description: Returned only in DEBUG/TESTING
    MFAConfirmRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 10
          example: "123456"
    MFAConfirmResponse:
      type: object
      properties:
        recovery_codes:
          type: array
          items:
            type: string
          example: ["a1b2c3d4", "e5f6g7h8"]
    MFADisableRequest:
      type: object
      required: [password]
      anyOf:
        - required: [code]
        - required: [recovery_code]
      properties:
        password:
          type: string
          format: password
        code:
          type: string
        recovery_code:
          type: string
    PasswordChangeRequest:
      type: object
      required: [currentPassword, newPassword, confirmNewPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 200
        newPassword:
          type: string
          maxLength: 200
          minLength: 8
          format: password
        confirmNewPassword:
          type: string
          maxLength: 200
    PasswordForgotRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          maxLength: 254
          format: email
    PasswordResetRequest:
      type: object
      required: [token, newPassword, confirmNewPassword]
      properties:
        token:
          type: string
          minLength: 10
          maxLength: 512
        newPassword:
          type: string
          maxLength: 200
          minLength: 8
          format: password
        confirmNewPassword:
          type: string
          maxLength: 200
    PasswordResetVerifyResponse:
      type: object
      properties:
        valid:
          type: boolean
    EmailUnsubscribeRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 10
          maxLength: 512
        reason:
          type: string
          maxLength: 200
    QuestionnaireTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
    QuestionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 64
        text:
          type: string
          maxLength: 500
        response_type:
          type: string
          enum:
            - likert_0_4
            - likert_1_5
            - boolean
            - frequency_0_3
            - intensity_0_10
            - count
            - ordinal
            - text_context
          description: |
            Tipos permitidos:
            - likert_0_4: escala 0-4
            - likert_1_5: escala 1-5
            - boolean: 0/1
            - frequency_0_3: 0=never,1=sometimes,2=often,3=always
            - intensity_0_10: escala 0-10
            - count: conteos (n veces)
            - ordinal: escala ordinal codificada
            - text_context: texto libre solo para contexto (no modelo)
        disorder_id:
          type: string
          format: uuid
          nullable: true
        disorder_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Prefer this field for multi-disorder questions.
        position:
          type: integer
          nullable: true
          minimum: 0
        response_min:
          type: number
          nullable: true
        response_max:
          type: number
          nullable: true
        response_step:
          type: number
          nullable: true
        response_options:
          type: array
          items:
            oneOf:
              - type: number
              - type: string
          nullable: true
    ActiveQuestionnaireResponse:
      type: object
      properties:
        questionnaire_template:
          $ref: "#/components/schemas/QuestionnaireTemplate"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionItem"
    QuestionnaireCreateRequest:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 120
        version:
          type: string
          maxLength: 32
          pattern: "^[A-Za-z0-9._-]{1,32}$"
        description:
          type: string
          nullable: true
    QuestionnaireCloneRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
          maxLength: 32
          pattern: "^[A-Za-z0-9._-]{1,32}$"
        name:
          type: string
          nullable: true
          minLength: 3
          maxLength: 120
        description:
          type: string
          nullable: true
    QuestionnaireCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
    QuestionnaireCloneResponse:
      type: object
      properties:
        template_id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        is_active:
          type: boolean
        question_count:
          type: integer
    QuestionCreateRequest:
      type: object
      required: [code, text, response_type]
      properties:
        code:
          type: string
          pattern: "^[A-Za-z0-9_-]{2,64}$"
          maxLength: 64
        text:
          type: string
          minLength: 3
          maxLength: 500
        response_type:
          type: string
          enum:
            - likert_0_4
            - likert_1_5
            - boolean
            - frequency_0_3
            - intensity_0_10
            - count
            - ordinal
            - text_context
          description: See QuestionItem.response_type for scale details.
        disorder_id:
          type: string
          format: uuid
          nullable: true
        disorder_ids:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
        position:
          type: integer
          nullable: true
          minimum: 0
        response_min:
          type: number
          nullable: true
        response_max:
          type: number
          nullable: true
        response_step:
          type: number
          nullable: true
        response_options:
          type: array
          items:
            oneOf:
              - type: number
              - type: string
          nullable: true
    QuestionCreateListRequest:
      type: array
      items:
        $ref: "#/components/schemas/QuestionCreateRequest"
    QuestionsCreatedResponse:
      type: object
      properties:
        template_id:
          type: string
          format: uuid
        created:
          type: integer
    EvaluationResponseItem:
      type: object
      required: [question_id, value]
      properties:
        question_id:
          type: string
          format: uuid
        value:
          oneOf:
            - type: number
            - type: string
    EvaluationCreateRequest:
      type: object
      required: [age_at_evaluation, evaluation_date, status, responses]
      properties:
        subject_id:
          type: string
          format: uuid
          nullable: true
        age_at_evaluation:
          type: integer
          minimum: 6
          maximum: 11
        evaluation_date:
          type: string
          format: date
        status:
          type: string
          enum: [draft, submitted, completed]
        is_anonymous:
          type: boolean
          default: true
        context:
          type: string
          nullable: true
        raw_symptoms:
          type: object
          nullable: true
        processed_features:
          type: object
          nullable: true
        access_key:
          type: string
          nullable: true
          minLength: 6
          maxLength: 64
        responses:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/EvaluationResponseItem"
    EvaluationCreateResponse:
      type: object
      properties:
        evaluation_id:
          type: string
          format: uuid
        registration_number:
          type: string
        questionnaire_template_id:
          type: string
          format: uuid
        access_key:
          type: string
    PredictRequest:
      type: object
      required:
        - age
        - sex
        - conners_inattention_score
        - conners_hyperactivity
        - cbcl_attention_score
        - sleep_problems
      properties:
        age:
          type: integer
