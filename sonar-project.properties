sonar.projectKey=EndDark16_CognIA
sonar.organization=enddark16
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Scope operativo mantenido del backend.
sonar.sources=api,app,config
sonar.python.coverage.reportPaths=artifacts/quality/sonar/latest/coverage.xml

sonar.exclusions=**/__pycache__/**,**/*.pyc

# Reglas con alto ruido en este repositorio (deuda estructural priorizada fuera de esta ventana).
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e3.resourceKey=config/settings.py
