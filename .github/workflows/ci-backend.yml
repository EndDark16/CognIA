name: CI Backend

on:
  push:
    branches: ["development", "main"]
    paths:
      - "api/**"
      - "app/**"
      - "config/**"
      - "core/**"
      - "migrations/**"
      - "scripts/**"
      - "tests/**"
      - "Dockerfile"
      - "docker/**"
      - "requirements.txt"
      - "run.py"
      - "docs/openapi.yaml"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches: ["development", "main"]
    paths:
      - "api/**"
      - "app/**"
      - "config/**"
      - "core/**"
      - "migrations/**"
      - "scripts/**"
      - "tests/**"
      - "Dockerfile"
      - "docker/**"
      - "requirements.txt"
      - "run.py"
      - "docs/openapi.yaml"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sanity check
        run: |
          python -m compileall -q api app config core scripts run.py

      - name: Import sanity check
        run: |
          python -c "from api.app import create_app; app = create_app(); print(app.name)"

      - name: Test suite
        run: |
          pytest -q

  docker-build:
    name: Docker build sanity
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cognia-backend:ci
