name: CI Backend

on:
  push:
    branches: ["development", "main"]
  pull_request:
    branches: ["development", "main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_ci:
    name: backend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Non-secret test key required by MFA encryption paths during pytest in CI.
      MFA_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: |
          ruff check --select F api tests

      - name: Compile sanity check
        run: |
          python -m compileall -q api app config core scripts run.py

      - name: Import sanity check
        run: |
          python -c "from api.app import create_app; app = create_app(); print(app.name)"

      - name: Test suite
        run: |
          pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cognia-backend:ci
